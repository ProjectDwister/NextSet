<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<script>
  // Same key, same mechanism as index.html and rally.html — one theme
  // choice, respected everywhere.
  (function () {
    try {
      var saved = localStorage.getItem('nextset-theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    } catch (e) {}
  })();
</script>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Events · Court Pop</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="icon" href="./icons/icon-192.png"/>
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png"/>
<meta name="theme-color" content="#0b1020" id="theme-color-meta"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Court Pop"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b1020;
    --panel: #121933;
    --panel-2: #1a2345;
    --text: #eef2ff;
    --muted: #aab4d6;
    --accent: #78e08f;
    --accent-ink: #06210f;
    --gold: #c9a869;
    --danger: #ffb4b4;
    --danger-border: rgba(255, 120, 120, 0.3);
    --border: rgba(255, 255, 255, 0.09);
    --warn-bg: rgba(255, 212, 121, 0.08);
    --warn-border: rgba(255, 212, 121, 0.25);
    --warn-text: #ffe9b8;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.25), 0 12px 28px -10px rgba(0, 0, 0, 0.5);
    --shadow-modal: 0 24px 70px -16px rgba(0, 0, 0, 0.6);
  }

  /* Light theme — same accent family (mint + gold), deepened where needed
     for contrast against a light background instead of a dark one.
     Toggled via a data-theme attribute on <html>, set as early as
     possible (see the inline script right after <head> opens) so there's
     no flash of the wrong theme on load. */
  :root[data-theme="light"] {
    --bg: #f6f4ef;
    --panel: #ffffff;
    --panel-2: #fcfbf8;
    --text: #14182a;
    --muted: #5c6478;
    --accent: #2f9e5c;
    --accent-ink: #ffffff;
    --gold: #93711f;
    --danger: #c0392b;
    --danger-border: rgba(192, 57, 43, 0.35);
    --border: rgba(11, 16, 32, 0.1);
    --warn-bg: rgba(178, 110, 10, 0.08);
    --warn-border: rgba(178, 110, 10, 0.25);
    --warn-text: #7a4f0a;
    --shadow-card: 0 1px 2px rgba(20, 24, 42, 0.06), 0 12px 28px -10px rgba(20, 24, 42, 0.14);
    --shadow-modal: 0 24px 70px -16px rgba(20, 24, 42, 0.22);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
  }
  h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
  h2 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
  p.sub { color: var(--muted); font-size: 0.92rem; margin: 0 0 22px; line-height: 1.55; }
  label { display: block; font-size: 0.78rem; color: var(--muted); font-weight: 500; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(9, 13, 28, 0.55);
    color: var(--text);
    font-size: 0.96rem;
    font-family: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(120, 224, 143, 0.15); }
  input:disabled { color: var(--muted); cursor: not-allowed; opacity: 0.75; }
  .menu-divider { height: 1px; background: var(--border); margin: 18px 0 16px; }
  .theme-toggle {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .theme-toggle-option {
    flex: 1;
    width: auto;
    padding: 8px 10px;
    font-size: 0.85rem;
    font-weight: 500;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
  }
  .theme-toggle-option.active {
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
  }
  button {
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
    font-size: 0.96rem;
    cursor: pointer;
    font-family: var(--font-body);
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  button:not(:disabled):hover { filter: brightness(1.07); }
  button:not(:disabled):active { transform: scale(0.98); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button:disabled { opacity: 0.55; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 10px;
    font-weight: 500;
  }
  a.modal-link-btn {
    display: block;
    box-sizing: border-box;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 10px;
    font-weight: 500;
    padding: 13px 14px;
    border-radius: 12px;
    font-size: 0.96rem;
    text-align: center;
    text-decoration: none;
  }
  button.secondary:not(:disabled):hover { filter: none; background: rgba(255, 255, 255, 0.04); }
  a.btn-sm.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-weight: 500;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  a.btn-sm.secondary:hover { background: rgba(255, 255, 255, 0.04); }
  a.btn-sm:not(.secondary) {
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  a.btn-sm:not(.secondary):hover { filter: brightness(0.96); }
  button.danger { color: var(--danger); border-color: var(--danger-border); }
  .error {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    color: var(--warn-text);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.85rem;
    margin-bottom: 14px;
    display: none;
  }
  .error.show { display: block; }

  .install-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text);
  }
  .install-banner.show { display: flex; }
  .install-banner-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .install-banner .btn-sm { margin: 0; }

  .reminder-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 20px;
    background: rgba(120, 224, 143, 0.08);
    border-bottom: 1px solid rgba(120, 224, 143, 0.2);
    font-size: 0.85rem;
    color: var(--text);
  }
  .reminder-banner.show { display: flex; }
  .reminder-banner .btn-sm { margin: 0; }

  .recent-invitees-label { font-size: 0.78rem; color: var(--muted); margin: 14px 0 6px; }
  .recent-invitees-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .recent-invitees-chips button {
    width: auto;
    margin: 0;
    padding: 6px 13px;
    font-size: 0.78rem;
    font-weight: 500;
    border-radius: 999px;
    background: rgba(120, 224, 143, 0.12);
    color: var(--accent);
    border: 1px solid rgba(120, 224, 143, 0.25);
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  .recent-invitees-chips button:hover { filter: brightness(1.15); }

  /* top-level view switch: sign-in vs the app itself */
  .view { display: none; }
  .view.active { display: block; }

  /* --- sign-in card --- */
  .auth-center {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .court-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    color: var(--accent);
    opacity: 0.14;
    pointer-events: none;
  }
  .card {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
    background: linear-gradient(165deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 26px;
    box-shadow: var(--shadow-card);
  }
  .step { display: none; }
  .step.active { display: block; animation: fade-up 0.3s ease; }
  .step input, .step button { margin-bottom: 14px; }

  /* --- app shell --- */
  .app-header {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px 22px;
    border-bottom: 1px solid var(--border);
  }
  .app-header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .app-brand-row { display: flex; align-items: center; gap: 7px; }
  .app-brand { font-size: 0.92rem; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: var(--muted); }
  .app-brand-pop {
    display: inline-block;
    animation: pop-color-cycle 5s ease-in-out infinite;
  }
  @keyframes pop-color-cycle {
    0%   { color: #e0b23a; opacity: 0.7; }
    20%  { color: #ff6fb5; opacity: 1; }
    40%  { color: #78e08f; opacity: 0.85; }
    60%  { color: #6fa8ff; opacity: 1; }
    80%  { color: #ff9f5a; opacity: 0.85; }
    100% { color: #e0b23a; opacity: 0.7; }
  }
  .app-brand-sep { font-size: 0.9rem; color: var(--muted); }
  .app-title { font-family: var(--font-display); font-weight: 500; font-style: italic; font-size: 1.3rem; letter-spacing: -0.01em; }
  .gear-btn {
    width: auto;
    flex-shrink: 0;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .gear-btn:hover { background: rgba(255, 255, 255, 0.04); }
  .app-header-right { display: flex; gap: 8px; }
  .btn-sm { width: auto; padding: 9px 16px; font-size: 0.85rem; border-radius: 10px; margin: 0; }
  .app-main { max-width: 720px; margin: 0 auto; padding: 24px 20px; }
  .section-title {
    font-size: 0.76rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 28px 0 12px;
    font-weight: 600;
  }
  .section-title:first-child { margin-top: 0; }
  .section-title.muted { opacity: 0.6; }
  .empty {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 30px 16px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 14px;
  }
  .games-list { display: flex; flex-direction: column; gap: 12px; }
  .game-card {
    background: linear-gradient(165deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px;
    box-shadow: var(--shadow-card);
    transition: border-color 0.15s ease, transform 0.15s ease;
    animation: fade-up 0.35s ease;
  }
  .game-card.past { opacity: 0.55; box-shadow: none; }
  .game-card.invite-pending { border-color: rgba(120, 224, 143, 0.35); }
  .game-when { font-family: var(--font-display); font-weight: 600; font-size: 1.15rem; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
  .game-where { color: var(--muted); font-size: 0.87rem; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .game-players { color: var(--text); font-size: 0.87rem; margin-top: 14px; display: flex; align-items: flex-start; gap: 8px; }
  .game-players .ic { margin-top: 3px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    font-size: 0.8rem;
    line-height: 1.4;
    color: var(--text);
  }
  .chip.organizer { color: var(--gold); }
  .ic { flex-shrink: 0; opacity: 0.75; }
  .game-when .ic { opacity: 0.55; }
  .game-meta { display: flex; align-items: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .tag {
    display: inline-block;
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.01em;
    background: rgba(120, 224, 143, 0.12);
    color: var(--accent);
    border: 1px solid rgba(120, 224, 143, 0.25);
  }
  .tag.gold { background: rgba(201, 168, 105, 0.14); color: var(--gold); border-color: rgba(201, 168, 105, 0.3); }
  .tag.warn { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
  .game-notes { color: var(--muted); font-size: 0.82rem; margin-top: 6px; font-style: italic; }
  .invite-status { font-size: 0.8rem; margin-top: 6px; }
  .invite-status.pending { color: var(--muted); }
  .invite-status.declined { color: var(--warn-text); }
  .conflict-warning { font-size: 0.8rem; margin-top: 6px; color: var(--warn-text); }
  .game-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .game-actions button {
    width: auto;
    padding: 8px 14px;
    font-size: 0.8rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    margin: 0;
  }
  .game-actions button:hover { filter: none; background: rgba(255, 255, 255, 0.05); }
  .game-actions button.accept {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: transparent;
    font-weight: 600;
  }
  .game-actions button.accept:hover { filter: brightness(1.07); background: var(--accent); }

  /* --- modals (new/edit game, invite) --- */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 20, 0.65);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .modal-backdrop.active { display: flex; animation: fade-in 0.2s ease; }
  .modal {
    width: 100%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
    background: linear-gradient(165deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px;
    box-shadow: var(--shadow-modal);
  }
  .modal-backdrop.active .modal { animation: modal-in 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .modal button { margin-top: 14px; }
  a.btn-link {
    display: block;
    box-sizing: border-box;
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
    font-size: 0.96rem;
    text-align: center;
    text-decoration: none;
    margin-top: 14px;
    transition: filter 0.15s ease;
  }
  a.btn-link:hover { filter: brightness(1.07); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<script>
  // Marks Events as the current section for the "reopen where I left
  // off" behaviour. No redirect-away logic needed here, same as
  // rally.html — index.html is the only page that ever redirects
  // toward a remembered section.
  try { localStorage.setItem('nextset-last-section', 'events'); } catch (e) {}
</script>

<div id="loading-view" style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
  <div style="color:var(--muted); font-size:0.9rem;">Loading…</div>
</div>

<div class="view" id="view-app" style="display:none;">
  <header class="app-header">

      <div class="app-brand-row">
        <span class="app-brand">Court <span class="app-brand-pop">Pop</span></span>

      <button id="menu-btn" class="gear-btn" type="button" aria-label="Settings">

          <circle cx="10" cy="10" r="1.8" />
          <line x1="15" y1="10" x2="17.3" y2="10" />

<!-- ===== menu modal ===== -->
<div class="modal-backdrop" id="menu-modal-backdrop">
  <div class="modal">
    <h2>Menu</h2>

    <a href="index.html?nav=1" class="modal-link-btn" style="margin-top:0; margin-bottom:8px;">Switch to Your Games</a>

    <div class="menu-divider"></div>

    <div class="menu-divider"></div>

<script type="module">
  import { auth } from './firebase-config.js';
  import { getMyProfile, updateMyProfileName, signOutUser } from './auth.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';

  const $ = (id) => document.getElementById(id);
  let currentUser = null;
  let currentProfile = null;

  // ---------------- theme ----------------
  function currentTheme() {
    return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
  }
  function applyTheme(theme) {
    const normalized = theme === 'light' ? 'light' : 'dark';
    if (normalized === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    try { localStorage.setItem('nextset-theme', normalized); } catch (e) {}
    const metaEl = $('theme-color-meta');
    if (metaEl) metaEl.setAttribute('content', normalized === 'light' ? '#f6f4ef' : '#0b1020');
    document.querySelectorAll('.theme-toggle-option').forEach((btn) => {
      btn.classList.toggle('active', btn.dataset.themeChoice === normalized);
    });
  }
  document.querySelectorAll('.theme-toggle-option').forEach((btn) => {
    btn.addEventListener('click', () => applyTheme(btn.dataset.themeChoice));
  });
  applyTheme(currentTheme());

  function setBusy(button, busy, busyLabel) {
    button.disabled = busy;
    if (busy) {
      button.dataset.originalLabel = button.textContent;
      button.textContent = busyLabel;
    } else if (button.dataset.originalLabel) {
      button.textContent = button.dataset.originalLabel;
    }
  }

  // ---------------- menu modal ----------------
  function openMenu() {
    $('menu-error').textContent = '';
    $('menu-error').classList.remove('show');
    $('menu-name').value = currentProfile ? currentProfile.name : '';
    $('menu-phone').value = currentProfile ? currentProfile.phone : '';
    $('menu-modal-backdrop').classList.add('active');
  }
  $('menu-btn').addEventListener('click', openMenu);
  $('menu-close-btn').addEventListener('click', () => {
    $('menu-modal-backdrop').classList.remove('active');
  });

  $('menu-save-name-btn').addEventListener('click', async () => {
    const name = $('menu-name').value.trim();
    const errEl = $('menu-error');
    if (!name) {
      errEl.textContent = 'Enter a name.';
      errEl.classList.add('show');
      return;
    }
    const btn = $('menu-save-name-btn');
    setBusy(btn, true, 'Saving…');
    try {
      await updateMyProfileName(currentUser.uid, name);
      currentProfile.name = name;
      errEl.textContent = '';
      errEl.classList.remove('show');
    } catch (err) {
      errEl.textContent = 'Could not save — try again.';
      errEl.classList.add('show');
    } finally {
      setBusy(btn, false);
    }
  });

  $('menu-signout-btn').addEventListener('click', async () => {
    await signOutUser();
    window.location.reload();
  });

  // ---------------- auth gate ----------------
  // No sign-in UI on this page on purpose, same as rally.html — not
  // signed in just means back to the main page to sign in there.
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      location.replace('index.html?nav=1');
      return;
    }
    currentUser = user;
    try {
      currentProfile = await getMyProfile(user.uid);
    } catch (e) {
      currentProfile = null;
    }
    $('loading-view').style.display = 'none';
    $('view-app').style.display = '';
  });
</script>
</body>
</html>
