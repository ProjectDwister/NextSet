function EventsApp() {
  const [authChecked, setAuthChecked] = useState(false);
  const [uid, setUid] = useState(null);
  const [profile, setProfile] = useState(null);
  const [loaded, setLoaded] = useState(false);
  const [myEvents, setMyEvents] = useState([]);
  const [myInvites, setMyInvites] = useState([]);
  const [myOrganizerInvites, setMyOrganizerInvites] = useState([]);
  const [adminEvents, setAdminEvents] = useState(null); // null = not an admin (or not yet known); array = admin, here's everything
  const [confirmingDeleteEvent, setConfirmingDeleteEvent] = useState(false);
  const [deletingEvent, setDeletingEvent] = useState(false);
  const [deleteEventError, setDeleteEventError] = useState("");
  const [inviteLoadError, setInviteLoadError] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [creating, setCreating] = useState(false);
  const [createError, setCreateError] = useState("");
  const [inviteBusyId, setInviteBusyId] = useState(null);
  const [acceptError, setAcceptError] = useState("");

  const [menuOpen, setMenuOpen] = useState(false);
  const [menuName, setMenuName] = useState("");
  const [menuError, setMenuError] = useState("");
  const [savingName, setSavingName] = useState(false);
  const [theme, setThemeState] = useState(() => (
    document.documentElement.getAttribute("data-theme") === "light" ? "light" : "dark"
  ));

  useEffect(() => {
    const unsubscribe = onAuthStateChanged(auth, (user) => {
      if (!user) {
        location.replace("index.html?nav=1");
        return;
      }
      setUid(user.uid);
      setAuthChecked(true);
    });
    return () => unsubscribe();
  }, []);

  useEffect(() => {
    if (!uid) return;
    let cancelled = false;
    getMyProfile(uid).then((p) => {
      if (cancelled || !p) return;
      setProfile(p);
      setMenuName(p.name || "");
    }).catch(() => {});
    return () => { cancelled = true; };
  }, [uid]);

  useEffect(() => {
    if (!uid || !profile) return;
    let gotEvents = false;
    let gotInvites = false;
    let gotOrgInvites = false;
    function maybeReady() {
      if (gotEvents && gotInvites && gotOrgInvites) setLoaded(true);
    }
    const unsub1 = watchMyPadelEvents(uid, (evs) => {
      setMyEvents(evs.sort((a, b) => (a.dateTime.toMillis?.() || 0) - (b.dateTime.toMillis?.() || 0)));
      gotEvents = true;
      maybeReady();
    }, () => { gotEvents = true; maybeReady(); });
    const unsub2 = watchMyPadelEventInvites(profile.phone, (invs) => {
      setMyInvites(invs);
      gotInvites = true;
      maybeReady();
    }, (err) => {
      console.error('watchMyPadelEventInvites failed:', err);
      setInviteLoadError(true);
      gotInvites = true;
      maybeReady();
    });
    const unsub3 = watchMyOrganizerInvites(profile.phone, (invs) => {
      setMyOrganizerInvites(invs);
      gotOrgInvites = true;
      maybeReady();
    }, (err) => {
      console.error('watchMyOrganizerInvites failed:', err);
      setInviteLoadError(true);
      gotOrgInvites = true;
      maybeReady();
    });
    return () => { unsub1(); unsub2(); unsub3(); };
  }, [uid, profile]);

  // Attempted unconditionally for every signed-in user — there's no
  // way to check "am I an admin" ahead of time, so this just runs and
  // quietly does nothing for everyone it's not meant for. Only ever
  // succeeds for the one account marked in the admins collection.
  useEffect(() => {
    if (!uid) return;
    const unsub = watchAllPadelEventsForAdmin(
      (evs) => setAdminEvents(evs),
      () => setAdminEvents(null),
    );
    return () => unsub();
  }, [uid]);

  function applyTheme(next) {
    const normalized = next === "light" ? "light" : "dark";
    if (normalized === "light") document.documentElement.setAttribute("data-theme", "light");
    else document.documentElement.removeAttribute("data-theme");
    try { localStorage.setItem("nextset-theme", normalized); } catch (e) {}
    setThemeState(normalized);
  }

  async function handleSaveName() {
    const name = menuName.trim();
    if (!name) { setMenuError("Enter a name."); return; }
    setSavingName(true);
    setMenuError("");
    try {
      await updateMyProfileName(uid, name);
      setProfile((p) => ({ ...(p || {}), name }));
    } catch (e) {
      setMenuError("Could not save — try again.");
    } finally {
      setSavingName(false);
    }
  }

  async function handleSignOut() {
    await signOutUser();
    location.replace("index.html?nav=1");
  }

  async function handleCreate(fields, iAmPlaying) {
    setCreating(true);
    setCreateError("");
    try {
      const id = await createPadelEvent(fields, uid, profile.name, iAmPlaying);
      setSelectedId(id);
    } catch (e) {
      setCreateError(e && e.message ? e.message : "Could not create event.");
    } finally {
      setCreating(false);
    }
  }

  async function handleAcceptInvite(inv) {
    setInviteBusyId(inv.eventId);
    setAcceptError("");
    try {
      await acceptPadelEventInvite(inv.eventId, inv.id, uid, profile.name);
      setSelectedId(inv.eventId);
    } catch (e) {
      console.error('acceptPadelEventInvite failed:', e);
      setAcceptError("Your invite was marked accepted, but adding you to the event failed: " + (e && e.message ? e.message : "unknown error") + ". Please tell whoever's organizing — this needs fixing on their end.");
    } finally {
      setInviteBusyId(null);
    }
  }

  async function handleDeclineInvite(inv) {
    setInviteBusyId(inv.eventId);
    try {
      await declinePadelEventInvite(inv.eventId, inv.id);
    } finally {
      setInviteBusyId(null);
    }
  }

  async function handleAcceptOrganizerInvite(inv) {
    setInviteBusyId(inv.eventId);
    setAcceptError("");
    try {
      await acceptOrganizerInvite(inv.eventId, inv.id, uid, profile.name);
      setSelectedId(inv.eventId);
    } catch (e) {
      console.error('acceptOrganizerInvite failed:', e);
      setAcceptError("Your invite was marked accepted, but adding you as an organizer failed: " + (e && e.message ? e.message : "unknown error") + ". Please tell whoever's organizing — this needs fixing on their end.");
    } finally {
      setInviteBusyId(null);
    }
  }

  async function handleDeclineOrganizerInvite(inv) {
    setInviteBusyId(inv.eventId);
    try {
      await declineOrganizerInvite(inv.eventId, inv.id);
    } finally {
      setInviteBusyId(null);
    }
  }

  async function handleLeaveAsPlayer() {
    if (!selectedId) return;
    await removeSelfFromParticipants(selectedId, uid);
  }

  async function handleRemoveParticipant(targetUid) {
    if (!selectedId) return;
    await removeParticipant(selectedId, targetUid);
  }

  async function handleDeleteEvent() {
    if (!selectedId) return;
    setDeletingEvent(true);
    setDeleteEventError("");
    try {
      await deletePadelEvent(selectedId);
      setSelectedId(null);
      setConfirmingDeleteEvent(false);
    } catch (e) {
      setDeleteEventError(e && e.message ? e.message : "Could not delete this event.");
    } finally {
      setDeletingEvent(false);
    }
  }

  async function handleRequestDeletion() {
    if (!selectedId) return;
    setDeletingEvent(true);
    setDeleteEventError("");
    try {
      await requestEventDeletion(selectedId, uid, profile.name);
    } catch (e) {
      setDeleteEventError(e && e.message ? e.message : "Could not send the request.");
    } finally {
      setDeletingEvent(false);
    }
  }

  async function handleCancelDeletionRequest() {
    if (!selectedId) return;
    setDeletingEvent(true);
    setDeleteEventError("");
    try {
      await cancelDeletionRequest(selectedId);
    } catch (e) {
      setDeleteEventError(e && e.message ? e.message : "Could not cancel that.");
    } finally {
      setDeletingEvent(false);
    }
  }

  if (!authChecked || !loaded) {
    return (
      <div className="rally-root flex items-center justify-center" style={{ minHeight: "60vh" }}>
        <style>{GLOBAL_STYLES}</style>
        <div style={{ color: "var(--slate)" }}>Loading…</div>
      </div>
    );
  }

  const selectedEvent = selectedId
    ? (myEvents.find((e) => e.id === selectedId) || (adminEvents || []).find((e) => e.id === selectedId))
    : null;
  const isOrganizer = selectedEvent && uid && (selectedEvent.organizers || []).includes(uid);

  return (
    <div className="rally-root">
      <style>{GLOBAL_STYLES}</style>

      <div className="max-w-xl mx-auto" style={{ padding: "20px 22px", borderBottom: "1px solid var(--line)" }}>
        <div className="flex items-center justify-between">
          <div className="flex items-center gap-1.5">
            <span className="font-bold uppercase" style={{ color: "var(--slate)", letterSpacing: "0.03em", fontSize: "0.92rem" }}>
              Court <span className="app-brand-pop">Pop</span>
            </span>
            <span className="text-sm font-bold" style={{ color: "var(--slate)" }}>-</span>
            <span style={{ color: "var(--ink)", fontFamily: "'Fraunces', Georgia, serif", fontWeight: 500, fontStyle: "italic", fontSize: "1.5rem", letterSpacing: "-0.01em" }}>
              Events
            </span>
          </div>
          <button type="button" onClick={() => setMenuOpen(true)}
            style={{ width: "auto", background: "var(--card)", border: "1px solid var(--line)", borderRadius: 8, padding: 8, color: "var(--slate)", display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}
            aria-label="Settings">
            <svg viewBox="0 0 20 20" width="19" height="19" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
              <circle cx="10" cy="10" r="5" />
              <circle cx="10" cy="10" r="1.8" />
              <line x1="15" y1="10" x2="17.3" y2="10" />
              <line x1="13.54" y1="13.54" x2="15.16" y2="15.16" />
              <line x1="10" y1="15" x2="10" y2="17.3" />
              <line x1="6.46" y1="13.54" x2="4.84" y2="15.16" />
              <line x1="5" y1="10" x2="2.7" y2="10" />
              <line x1="6.46" y1="6.46" x2="4.84" y2="4.84" />
              <line x1="10" y1="5" x2="10" y2="2.7" />
              <line x1="13.54" y1="6.46" x2="15.16" y2="4.84" />
            </svg>
          </button>
        </div>
      </div>

      {selectedEvent ? (
        <div className="max-w-xl mx-auto px-4 pt-4">
          <button type="button" onClick={() => setSelectedId(null)} className="text-xs font-semibold mb-4"
            style={{ width: "auto", color: "var(--slate)" }}>
            &larr; All events
          </button>
        </div>
      ) : null}

      {selectedEvent ? (
        selectedEvent.drawGenerated
          ? <EventFull event={selectedEvent} eventId={selectedEvent.id} isOrganizer={isOrganizer} />
          : <EventNotFull event={selectedEvent} eventId={selectedEvent.id} myUid={uid} myPhone={profile.phone} isOrganizer={isOrganizer}
              onInvited={() => {}} onLeaveAsPlayer={handleLeaveAsPlayer} onRemoveParticipant={handleRemoveParticipant} />
      ) : null}

      {selectedEvent && isOrganizer ? (
        <div className="max-w-xl mx-auto px-4" style={{ paddingBottom: "2rem" }}>
          <div className="rally-card p-4" style={{ borderColor: "var(--danger)" }}>
            {uid === selectedEvent.createdBy ? (
              selectedEvent.deleteRequestedBy ? (
                <React.Fragment>
                  <div className="text-sm font-bold mb-1" style={{ color: "var(--danger)" }}>Deletion requested</div>
                  <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
                    {selectedEvent.deleteRequestedByName || "Another organizer"} has asked for this event to be
                    deleted. Nothing happens unless you approve it.
                  </div>
                  {deleteEventError ? (
                    <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
                      {deleteEventError}
                    </div>
                  ) : null}
                  <div className="flex gap-2">
                    <button type="button" onClick={handleDeleteEvent} disabled={deletingEvent}
                      className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{ background: "var(--danger)", color: "#fff" }}>
                      {deletingEvent ? "…" : "Approve — delete permanently"}
                    </button>
                    <button type="button" onClick={handleCancelDeletionRequest} disabled={deletingEvent}
                      className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{ border: "1.5px solid var(--line)", color: "var(--slate)" }}>
                      Deny
                    </button>
                  </div>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div className="text-sm font-bold mb-1" style={{ color: "var(--danger)" }}>Delete this event</div>
                  <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
                    Removes the event, every invite sent, and the draw if one exists. Nobody can undo this — including you.
                  </div>
                  {deleteEventError ? (
                    <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
                      {deleteEventError}
                    </div>
                  ) : null}
                  {confirmingDeleteEvent ? (
                    <div className="flex gap-2">
                      <button type="button" onClick={handleDeleteEvent} disabled={deletingEvent}
                        className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{ background: "var(--danger)", color: "#fff" }}>
                        {deletingEvent ? "Deleting…" : "Yes, delete permanently"}
                      </button>
                      <button type="button" onClick={() => setConfirmingDeleteEvent(false)} disabled={deletingEvent}
                        className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{ border: "1.5px solid var(--line)", color: "var(--slate)" }}>
                        Cancel
                      </button>
                    </div>
                  ) : (
                    <button type="button" onClick={() => setConfirmingDeleteEvent(true)}
                      className="w-full py-2.5 rounded-xl text-sm font-semibold" style={{ border: "1.5px solid var(--danger)", color: "var(--danger)" }}>
                      Delete event
                    </button>
                  )}
                </React.Fragment>
              )
            ) : (
              <React.Fragment>
                <div className="text-sm font-bold mb-1" style={{ color: "var(--danger)" }}>
                  {selectedEvent.deleteRequestedBy === uid ? "Deletion requested" : "Request deletion"}
                </div>
                <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
                  {selectedEvent.deleteRequestedBy === uid
                    ? "Waiting for the event's original organizer to approve. You can withdraw this any time."
                    : "Only the event's original organizer can delete it directly — this asks them to, rather than deleting it yourself."}
                </div>
                {deleteEventError ? (
                  <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
                    {deleteEventError}
                  </div>
                ) : null}
                {selectedEvent.deleteRequestedBy === uid ? (
                  <button type="button" onClick={handleCancelDeletionRequest} disabled={deletingEvent}
                    className="w-full py-2.5 rounded-xl text-sm font-semibold" style={{ border: "1.5px solid var(--line)", color: "var(--slate)" }}>
                    Withdraw request
                  </button>
                ) : (
                  <button type="button" onClick={handleRequestDeletion} disabled={deletingEvent}
                    className="w-full py-2.5 rounded-xl text-sm font-semibold" style={{ border: "1.5px solid var(--danger)", color: "var(--danger)" }}>
                    {deletingEvent ? "…" : "Request deletion"}
                  </button>
                )}
              </React.Fragment>
            )}
          </div>
        </div>
      ) : null}

      {!selectedEvent ? (
        <div style={{ paddingTop: "1.25rem" }}>
          {inviteLoadError ? (
            <div className="max-w-xl mx-auto px-4" style={{ paddingBottom: "1rem" }}>
              <div className="text-sm px-3 py-2.5 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
                Couldn't check for pending invitations — this usually means a one-time Firestore setup step
                (a missing index) hasn't finished yet. Reloading in a minute often fixes it; if it doesn't,
                check the browser console for a Firestore link to create the missing index.
              </div>
            </div>
          ) : null}
          {acceptError ? (
            <div className="max-w-xl mx-auto px-4" style={{ paddingBottom: "1rem" }}>
              <div className="text-sm px-3 py-2.5 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
                {acceptError}
              </div>
            </div>
          ) : null}
          <InvitationsSection invites={myInvites} onAccept={handleAcceptInvite} onDecline={handleDeclineInvite}
            organizerInvites={myOrganizerInvites} onAcceptOrganizer={handleAcceptOrganizerInvite} onDeclineOrganizer={handleDeclineOrganizerInvite}
            busyId={inviteBusyId} />

          <div className="max-w-xl mx-auto px-4" style={{ paddingBottom: "1.5rem" }}>
            <div className="text-xs font-bold uppercase mb-3" style={{ color: "var(--slate)", letterSpacing: "0.04em" }}>
              Hosted draw
            </div>
            <a href="americano-8-player-event.html" className="rally-card w-full text-left p-4 block" style={{ textDecoration: "none" }}>
              <div className="flex items-start justify-between gap-3">
                <div>
                  <div className="text-sm font-bold mb-1" style={{ color: "var(--ink)" }}>8-Player Americano</div>
                  <div className="text-xs mb-2" style={{ color: "var(--slate)" }}>7 rounds · 2 courts · perfect partner and opponent rotation</div>
                  <span className="rally-chip px-3 py-1 text-xs font-semibold" style={{ color: "var(--court-blue)" }}>
                    Open public event page
                  </span>
                </div>
                <span aria-hidden="true" style={{ color: "var(--slate)", fontSize: "1.1rem" }}>→</span>
              </div>
            </a>
          </div>

          {myEvents.length ? <EventsList events={myEvents} onSelect={setSelectedId} /> : null}

          {adminEvents && adminEvents.filter((ev) => !myEvents.some((mine) => mine.id === ev.id)).length ? (
            <div>
              <div className="max-w-xl mx-auto px-4" style={{ paddingBottom: "0.5rem" }}>
                <div className="text-xs" style={{ color: "var(--slate)" }}>
                  Visible to you as an admin — you're not a player or organizer of these, viewing only.
                </div>
              </div>
              <EventsList
                events={adminEvents.filter((ev) => !myEvents.some((mine) => mine.id === ev.id))}
                onSelect={setSelectedId}
                title="All events"
              />
            </div>
          ) : null}

          <div className="max-w-xl mx-auto px-4">
            {myEvents.length ? (
              <button type="button" onClick={() => setSelectedId("__new__")}
                className="rally-btn-primary w-full py-3 text-sm mb-5">
                + Create another event
              </button>
            ) : null}
          </div>

          {!myEvents.length ? (
            <CreateEventForm onCreate={handleCreate} creating={creating} error={createError} />
          ) : null}
        </div>
      ) : null}

      {selectedId === "__new__" ? (
        <div style={{ position: "fixed", inset: 0, background: "var(--chalk)", overflowY: "auto", zIndex: 40 }}>
          <div className="max-w-xl mx-auto px-4 pt-6">
            <button type="button" onClick={() => setSelectedId(null)} className="text-xs font-semibold mb-4"
              style={{ width: "auto", color: "var(--slate)" }}>
              &larr; Cancel
            </button>
          </div>
          <CreateEventForm onCreate={handleCreate} creating={creating} error={createError} />
        </div>
      ) : null}

      {menuOpen ? (
        <MenuModal
          profile={profile}
          nameValue={menuName}
          onNameChange={setMenuName}
          onSaveName={handleSaveName}
          savingName={savingName}
          error={menuError}
          theme={theme}
          onThemeChange={applyTheme}
          onSignOut={handleSignOut}
          onClose={() => { setMenuOpen(false); setMenuError(""); }}
        />
      ) : null}
    </div>
  );
}

const eventsRootEl = document.getElementById("root");
ReactDOM.createRoot(eventsRootEl).render(<EventsApp />);
if (typeof window !== "undefined") window.__eventsMounted = true;
</script>
</body>
</html>
