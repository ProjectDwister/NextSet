<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<script>
  (function () {
    try {
      var saved = localStorage.getItem('nextset-theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    } catch (e) {}
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Events · Court Pop</title>
<link rel="manifest" href="./manifest.json"/>
<link rel="icon" href="./icons/icon-192.png"/>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Archivo+Black&family=Fraunces:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b1020;
    --panel: #121933;
    --panel-2: #1a2345;
    --text: #eef2ff;
    --muted: #aab4d6;
    --accent: #78e08f;
    --accent-ink: #06210f;
    --gold: #c9a869;
    --danger: #ffb4b4;
    --danger-border: rgba(255, 120, 120, 0.3);
    --border: rgba(255, 255, 255, 0.09);
    --warn-bg: rgba(255, 212, 121, 0.08);
    --warn-border: rgba(255, 212, 121, 0.25);
    --warn-text: #ffe9b8;
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --shadow-card: 0 1px 2px rgba(0, 0, 0, 0.25), 0 12px 28px -10px rgba(0, 0, 0, 0.5);
    --shadow-modal: 0 24px 70px -16px rgba(0, 0, 0, 0.6);
  }

  /* Light theme — same accent family (mint + gold), deepened where needed
     for contrast against a light background instead of a dark one.
     Toggled via a data-theme attribute on <html>, set as early as
     possible (see the inline script right after <head> opens) so there's
     no flash of the wrong theme on load. */
  :root[data-theme="light"] {
    --bg: #f6f4ef;
    --panel: #ffffff;
    --panel-2: #fcfbf8;
    --text: #14182a;
    --muted: #5c6478;
    --accent: #2f9e5c;
    --accent-ink: #ffffff;
    --gold: #93711f;
    --danger: #c0392b;
    --danger-border: rgba(192, 57, 43, 0.35);
    --border: rgba(11, 16, 32, 0.1);
    --warn-bg: rgba(178, 110, 10, 0.08);
    --warn-border: rgba(178, 110, 10, 0.25);
    --warn-text: #7a4f0a;
    --shadow-card: 0 1px 2px rgba(20, 24, 42, 0.06), 0 12px 28px -10px rgba(20, 24, 42, 0.14);
    --shadow-modal: 0 24px 70px -16px rgba(20, 24, 42, 0.22);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
  }
  h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
  h2 { font-family: var(--font-display); font-size: 1.25rem; font-weight: 600; margin: 0 0 8px; letter-spacing: -0.01em; }
  p.sub { color: var(--muted); font-size: 0.92rem; margin: 0 0 22px; line-height: 1.55; }
  label { display: block; font-size: 0.78rem; color: var(--muted); font-weight: 500; margin-bottom: 6px; margin-top: 14px; }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(9, 13, 28, 0.55);
    color: var(--text);
    font-size: 0.96rem;
    font-family: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(120, 224, 143, 0.15); }
  input:disabled { color: var(--muted); cursor: not-allowed; opacity: 0.75; }
  .menu-divider { height: 1px; background: var(--border); margin: 18px 0 16px; }
  .theme-toggle {
    display: flex;
    gap: 4px;
    padding: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .theme-toggle-option {
    flex: 1;
    width: auto;
    padding: 8px 10px;
    font-size: 0.85rem;
    font-weight: 500;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
  }
  .theme-toggle-option.active {
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
  }
  button {
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    border: none;
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
    font-size: 0.96rem;
    cursor: pointer;
    font-family: var(--font-body);
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  button:not(:disabled):hover { filter: brightness(1.07); }
  button:not(:disabled):active { transform: scale(0.98); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button:disabled { opacity: 0.55; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 10px;
    font-weight: 500;
  }
  a.modal-link-btn {
    display: block;
    box-sizing: border-box;
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    margin-top: 10px;
    font-weight: 500;
    padding: 13px 14px;
    border-radius: 12px;
    font-size: 0.96rem;
    text-align: center;
    text-decoration: none;
  }
  button.secondary:not(:disabled):hover { filter: none; background: rgba(255, 255, 255, 0.04); }
  a.btn-sm.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-weight: 500;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  a.btn-sm.secondary:hover { background: rgba(255, 255, 255, 0.04); }
  a.btn-sm:not(.secondary) {
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  a.btn-sm:not(.secondary):hover { filter: brightness(0.96); }
  button.danger { color: var(--danger); border-color: var(--danger-border); }
  .error {
    background: var(--warn-bg);
    border: 1px solid var(--warn-border);
    color: var(--warn-text);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.85rem;
    margin-bottom: 14px;
    display: none;
  }
  .error.show { display: block; }

  .install-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 16px;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text);
  }
  .install-banner.show { display: flex; }
  .install-banner-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .install-banner .btn-sm { margin: 0; }

  .reminder-banner {
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 20px;
    background: rgba(120, 224, 143, 0.08);
    border-bottom: 1px solid rgba(120, 224, 143, 0.2);
    font-size: 0.85rem;
    color: var(--text);
  }
  .reminder-banner.show { display: flex; }
  .reminder-banner .btn-sm { margin: 0; }

  .recent-invitees-label { font-size: 0.78rem; color: var(--muted); margin: 14px 0 6px; }
  .recent-invitees-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .recent-invitees-chips button {
    width: auto;
    margin: 0;
    padding: 6px 13px;
    font-size: 0.78rem;
    font-weight: 500;
    border-radius: 999px;
    background: rgba(120, 224, 143, 0.12);
    color: var(--accent);
    border: 1px solid rgba(120, 224, 143, 0.25);
    transition: filter 0.15s ease, transform 0.1s ease;
  }
  .recent-invitees-chips button:hover { filter: brightness(1.15); }

  /* top-level view switch: sign-in vs the app itself */
  .view { display: none; }
  .view.active { display: block; }

  /* --- sign-in card --- */
  .auth-center {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }
  .court-lines {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    color: var(--accent);
    opacity: 0.14;
    pointer-events: none;
  }
  .card {
    width: 100%;
    max-width: 380px;
    position: relative;
    z-index: 1;
    background: linear-gradient(165deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 26px;
    box-shadow: var(--shadow-card);
  }
  .step { display: none; }
  .step.active { display: block; animation: fade-up 0.3s ease; }
  .step input, .step button { margin-bottom: 14px; }

  /* --- app shell --- */
  .app-header {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 20px 22px;
    border-bottom: 1px solid var(--border);
  }
  .app-header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .app-brand-row { display: flex; align-items: center; gap: 7px; }
  .app-brand { font-size: 0.92rem; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; color: var(--muted); }
  .app-brand-pop {
    display: inline-block;
    animation: pop-color-cycle 5s ease-in-out infinite;
  }
  @keyframes pop-color-cycle {
    0%   { color: #e0b23a; opacity: 0.7; }
    20%  { color: #ff6fb5; opacity: 1; }
    40%  { color: #78e08f; opacity: 0.85; }
    60%  { color: #6fa8ff; opacity: 1; }
    80%  { color: #ff9f5a; opacity: 0.85; }
    100% { color: #e0b23a; opacity: 0.7; }
  }
  .app-brand-sep { font-size: 0.9rem; color: var(--muted); }
  .app-title { font-family: var(--font-display); font-weight: 500; font-style: italic; font-size: 1.3rem; letter-spacing: -0.01em; }
  .gear-btn {
    width: auto;
    flex-shrink: 0;
    padding: 8px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .gear-btn:hover { background: rgba(255, 255, 255, 0.04); }
  .app-header-right { display: flex; gap: 8px; }
  .btn-sm { width: auto; padding: 9px 16px; font-size: 0.85rem; border-radius: 10px; margin: 0; }
  .app-main { max-width: 720px; margin: 0 auto; padding: 24px 20px; }
  .section-title {
    font-size: 0.76rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 28px 0 12px;
    font-weight: 600;
  }
  .section-title:first-child { margin-top: 0; }
  .section-title.muted { opacity: 0.6; }
  .empty {
    color: var(--muted);
    font-size: 0.9rem;
    padding: 30px 16px;
    text-align: center;
    border: 1px dashed var(--border);
    border-radius: 14px;
  }
  .games-list { display: flex; flex-direction: column; gap: 12px; }
  .game-card {
    background: linear-gradient(165deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px;
    box-shadow: var(--shadow-card);
    transition: border-color 0.15s ease, transform 0.15s ease;
    animation: fade-up 0.35s ease;
  }
  .game-card.past { opacity: 0.55; box-shadow: none; }
  .game-card.invite-pending { border-color: rgba(120, 224, 143, 0.35); }
  .game-when { font-family: var(--font-display); font-weight: 600; font-size: 1.15rem; letter-spacing: -0.01em; display: flex; align-items: center; gap: 8px; }
  .game-where { color: var(--muted); font-size: 0.87rem; margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .game-players { color: var(--text); font-size: 0.87rem; margin-top: 14px; display: flex; align-items: flex-start; gap: 8px; }
  .game-players .ic { margin-top: 3px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--border);
    font-size: 0.8rem;
    line-height: 1.4;
    color: var(--text);
  }
  .chip.organizer { color: var(--gold); }
  .ic { flex-shrink: 0; opacity: 0.75; }
  .game-when .ic { opacity: 0.55; }
  .game-meta { display: flex; align-items: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  .tag {
    display: inline-block;
    font-size: 0.72rem;
    padding: 4px 10px;
    border-radius: 999px;
    font-weight: 500;
    letter-spacing: 0.01em;
    background: rgba(120, 224, 143, 0.12);
    color: var(--accent);
    border: 1px solid rgba(120, 224, 143, 0.25);
  }
  .tag.gold { background: rgba(201, 168, 105, 0.14); color: var(--gold); border-color: rgba(201, 168, 105, 0.3); }
  .tag.warn { background: var(--warn-bg); color: var(--warn-text); border-color: var(--warn-border); }
  .game-notes { color: var(--muted); font-size: 0.82rem; margin-top: 6px; font-style: italic; }
  .invite-status { font-size: 0.8rem; margin-top: 6px; }
  .invite-status.pending { color: var(--muted); }
  .invite-status.declined { color: var(--warn-text); }
  .conflict-warning { font-size: 0.8rem; margin-top: 6px; color: var(--warn-text); }
  .game-actions { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .game-actions button {
    width: auto;
    padding: 8px 14px;
    font-size: 0.8rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 10px;
    margin: 0;
  }
  .game-actions button:hover { filter: none; background: rgba(255, 255, 255, 0.05); }
  .game-actions button.accept {
    background: var(--accent);
    color: var(--accent-ink);
    border-color: transparent;
    font-weight: 600;
  }
  .game-actions button.accept:hover { filter: brightness(1.07); background: var(--accent); }

  /* --- modals (new/edit game, invite) --- */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5, 8, 20, 0.65);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .modal-backdrop.active { display: flex; animation: fade-in 0.2s ease; }
  .modal {
    width: 100%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
    background: linear-gradient(165deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 26px;
    box-shadow: var(--shadow-modal);
  }
  .modal-backdrop.active .modal { animation: modal-in 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .modal button { margin-top: 14px; }
  a.btn-link {
    display: block;
    box-sizing: border-box;
    width: 100%;
    padding: 13px 14px;
    border-radius: 12px;
    background: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
    font-size: 0.96rem;
    text-align: center;
    text-decoration: none;
    margin-top: 14px;
    transition: filter 0.15s ease;
  }
  a.btn-link:hover { filter: brightness(1.07); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>

/* ============================================================
   Small display helpers — ported from rally.html (computeStandings,
   playerName, playerById, roundIsComplete). Kept deliberately simple
   and duplicated rather than shared across files, since these are
   short, low-risk display functions, not the actual generation
   algorithm (which is the one thing that lives in exactly one place,
   the Cloud Function, on purpose).
   ============================================================ */

function playerName(players, id) {
  const idx = players.findIndex((p) => p.id === id);
  if (idx === -1) return "—";
  const p = players[idx];
  return p.name && p.name.trim() ? p.name.trim() : `Player ${idx + 1}`;
}

function playerById(players, id) {
  return players.find((p) => p.id === id) || null;
}

// A court's score only counts as final once confirmed — not merely
// "has numbers in it," since Edit can reopen an already-confirmed
// score while the old values are still sitting in Firestore pending
// the next Confirm. confirmed === undefined (not false, not true) is
// treated as final if both scores are present — that's specifically
// for scores entered before this Confirm/Edit flow existed at all,
// which never had this field set to begin with.
function courtScoreIsFinal(court) {
  return court.scoreA != null && court.scoreB != null && court.confirmed !== false;
}

function roundIsComplete(round) {
  return round.courts.every(courtScoreIsFinal);
}

function computeStandings(players, rounds) {
  const points = {};
  const against = {};
  const played = {};
  const wins = {};
  players.forEach((p) => {
    points[p.id] = 0;
    against[p.id] = 0;
    played[p.id] = 0;
    wins[p.id] = 0;
  });
  rounds.forEach((round) => {
    round.courts.forEach((court) => {
      if (!courtScoreIsFinal(court)) return;
      const aWon = court.scoreA > court.scoreB;
      const bWon = court.scoreB > court.scoreA;
      court.teamA.forEach((id) => {
        points[id] += court.scoreA;
        against[id] += court.scoreB;
        played[id] += 1;
        if (aWon) wins[id] += 1;
      });
      court.teamB.forEach((id) => {
        points[id] += court.scoreB;
        against[id] += court.scoreA;
        played[id] += 1;
        if (bWon) wins[id] += 1;
      });
    });
  });
  return players
    .map((p) => ({
      id: p.id,
      name: p.name,
      points: points[p.id],
      against: against[p.id],
      diff: points[p.id] - against[p.id],
      played: played[p.id],
      wins: wins[p.id],
    }))
    .sort((a, b) => b.points - a.points || b.diff - a.diff || b.wins - a.wins);
}

function suggestedRounds(numPlayers) {
  if (numPlayers <= 8) return Math.max(4, numPlayers - 1);
  if (numPlayers <= 16) return 8;
  return 7;
}

// Contact Picker API — same feature detection, same E.164 best-guess
// logic as index.html's own invite flow, ported over rather than
// reimplemented. Real support is Chrome/Android only; every other
// browser just falls back to typing the number by hand.
function contactPickerSupported() {
  return "contacts" in navigator && "ContactsManager" in window;
}

function guessE164(rawTel, myPhone) {
  let digits = rawTel.replace(/[^\d+]/g, "");
  if (digits.startsWith("+")) return digits;
  const match = myPhone && myPhone.match(/^\+(\d{1,3})/);
  if (!match) return digits;
  digits = digits.replace(/^0+/, "");
  return `+${match[1]}${digits}`;
}

async function pickContactFromPhone(myPhone) {
  try {
    const contacts = await navigator.contacts.select(["name", "tel"], { multiple: false });
    if (!contacts || !contacts.length) return null; // backed out of the picker
    const chosen = contacts[0];
    const rawTel = chosen.tel && chosen.tel[0];
    if (!rawTel) return { error: "That contact doesn't have a phone number saved." };
    return {
      phone: guessE164(rawTel, myPhone),
      name: (chosen.name && chosen.name[0]) || "",
    };
  } catch (e) {
    return null; // dismissed or blocked
  }
}

// Same reasoning as index.html's own nudge: this only ever builds a
// WhatsApp "click to chat" link pre-filled with a message — the
// inviter still has to tap send inside WhatsApp themselves, there's
// no way to push a message on someone's behalf without WhatsApp's
// Business API. Not automatic, just one tap shorter than typing the
// whole thing by hand.
function appUrlForSharing() {
  return window.location.origin + window.location.pathname;
}

function buildEventInviteMessage(ev, invitedName, asOrganizer) {
  const where = ev.location + (ev.courts ? ` (${ev.courts})` : "");
  const role = asOrganizer ? "to help organize a padel event" : "to a padel event";
  return `Hey${invitedName ? " " + invitedName : ""}! I've invited you ${role} — `
    + `${formatEventWhen(ev)} at ${where}. Open ${appUrlForSharing()} and sign in with `
    + `this number to see it and accept.`;
}

function buildWhatsAppLink(phone, message) {
  const digits = phone.replace(/[^\d]/g, ""); // wa.me wants digits only, no '+'
  return `https://wa.me/${digits}?text=${encodeURIComponent(message)}`;
}

function formatEventWhen(ev) {
  const start = ev.dateTime.toDate ? ev.dateTime.toDate() : new Date(ev.dateTime);
  const end = new Date(start.getTime() + (ev.durationMin || 0) * 60000);
  const dayStr = start.toLocaleDateString(undefined, { weekday: "short", day: "numeric", month: "short", year: "numeric" });
  const startStr = start.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  const endStr = end.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  return `${dayStr} · ${startStr} – ${endStr}`;
}

      setOrgName("");
    } catch (e) {
      setOrgError(e && e.message ? e.message : "Could not send organizer invite.");
    } finally {
      setSendingOrgInvite(false);
    }
  };

  const makeOrganizer = async (uid, personName) => {
    setOrgError("");
    try {
      await addOrganizer(eventId, uid, personName);
    } catch (e) {
      setOrgError(e && e.message ? e.message : "Could not add organizer.");
    }
  };

  const revokeOrganizer = async (uid) => {
    setOrgError("");
    try {
      await removeOrganizer(eventId, uid);
    } catch (e) {
      setOrgError(e && e.message ? e.message : "Could not remove organizer.");
    }
  };

  const handleSaveAlias = async () => {
    setSavingAlias(true);
    setOrgError("");
    try {
      await setOrganizerAlias(eventId, myUid, aliasInput);
      setEditingAlias(false);
    } catch (e) {
      setOrgError(e && e.message ? e.message : "Could not save that.");
    } finally {
      setSavingAlias(false);
    }
  };

  const handleSaveRounds = async () => {
    const n = Number(roundsInput);
    if (!n || n < 1) return setRoundsError("Enter at least 1 round.");
    setSavingRounds(true);
    setRoundsError("");
    try {
      await updatePadelEvent(eventId, { numRounds: n });
      setEditingRounds(false);
    } catch (e) {
      setRoundsError(e && e.message ? e.message : "Could not save that.");
    } finally {
      setSavingRounds(false);
    }
  };

  const handleLeaveAsPlayer = async () => {
    setLeaving(true);
    try {
      await onLeaveAsPlayer();
    } finally {
      setLeaving(false);
    }
  };

  const handleRemoveParticipant = async (uid) => {
    setRemovingUid(uid);
    try {
      await onRemoveParticipant(uid);
    } finally {
      setRemovingUid(null);
    }
  };

  const handleAddGuest = async () => {
    if (!guestName.trim()) return setGuestError("Enter a name.");
    setAddingGuest(true);
    setGuestError("");
    try {
      await addGuestPlayer(eventId, guestName.trim());
      setGuestName("");
    } catch (e) {
      setGuestError(e && e.message ? e.message : "Could not add player.");
    } finally {
      setAddingGuest(false);
    }
  };

  const startEditingName = (uid, currentName) => {
    setEditingUid(uid);
    setEditNameValue(currentName);
  };

  const handleSaveEdit = async () => {
    if (!editNameValue.trim()) return;
    setSavingEdit(true);
    try {
      await editParticipantName(eventId, editingUid, editNameValue.trim());
      setEditingUid(null);
    } catch (e) {
      // rare in practice; the field just stays open to retry
    } finally {
      setSavingEdit(false);
    }
  };

  return (
    <div className="max-w-xl mx-auto px-4 pb-28">
      <div className="rally-display text-xl mb-1" style={{ color: "var(--ink)" }}>
        {event.location}
      </div>
      <p className="text-sm mb-1" style={{ color: "var(--slate)" }}>{formatEventWhen(event)}</p>
      <p className="text-sm mb-1" style={{ color: "var(--slate)" }}>{event.courts}</p>

      {editingRounds ? (
        <div className="flex gap-2 items-center mb-5">
          <input type="number" min="1" step="1" value={roundsInput} onChange={(e) => setRoundsInput(e.target.value)}
            className="px-3 py-2 rounded-lg text-sm rally-tabular"
            style={{ width: "80px", border: "1px solid var(--line)", background: "var(--chalk)", color: "var(--ink)" }} />
          <button type="button" onClick={handleSaveRounds} disabled={savingRounds}
            className="text-xs font-semibold px-3 py-2 rounded-lg" style={{ width: "auto", background: "var(--court-blue)", color: "var(--court-blue-ink)" }}>
            {savingRounds ? "…" : "Save"}
          </button>
          <button type="button" onClick={() => setEditingRounds(false)} disabled={savingRounds}
            className="text-xs font-semibold px-3 py-2 rounded-lg" style={{ width: "auto", color: "var(--slate)" }}>
            Cancel
          </button>
        </div>
      ) : (
        <p className="text-sm mb-5" style={{ color: "var(--slate)" }}>
          {event.numRounds} rounds
          {isOrganizer ? (
            <button type="button" onClick={() => { setRoundsInput(event.numRounds); setEditingRounds(true); }}
              className="text-xs font-semibold" style={{ width: "auto", color: "var(--slate)", textDecoration: "underline", marginLeft: "8px" }}>
              Change
            </button>
          ) : null}
        </p>
      )}
      {roundsError ? (
        <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
          {roundsError}
        </div>
      ) : null}

      <div className="rally-card p-4 mb-5">
        <div className="text-sm font-bold mb-1" style={{ color: "var(--ink)" }}>Organizers</div>
        <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
          Up to 4. Only organizers can invite, add, edit, or remove players, and manage scoring — whether or not they're playing themselves.
        </div>
        {orgError ? (
          <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
            {orgError}
          </div>
        ) : null}
        <div className="flex flex-wrap gap-1.5 mb-2">
          {organizers.map((uid) => {
            const displayName = (event.organizerAliases || {})[uid] || (event.participantNames || {})[uid] || "Someone";
            const isCreator = uid === event.createdBy;
            return (
              <span key={uid} className="rally-chip px-3 py-1 text-xs font-semibold flex items-center gap-1.5" style={{ color: "var(--ink)" }}>
                {displayName}
                {isOrganizer && organizers.length > 1 && !isCreator ? (
                  <button type="button" onClick={() => revokeOrganizer(uid)} style={{ width: "auto", color: "var(--danger)", fontWeight: 700 }}>&times;</button>
                ) : null}
              </span>
            );
          })}
        </div>

        {isOrganizer ? (
          editingAlias ? (
            <div className="flex gap-2 mb-3">
              <input type="text" value={aliasInput} onChange={(e) => setAliasInput(e.target.value)}
                placeholder="How you're shown as organizer"
                className="flex-1 px-3 py-2 rounded-lg text-xs"
                style={{ border: "1px solid var(--line)", background: "var(--chalk)", color: "var(--ink)" }} />
              <button type="button" onClick={handleSaveAlias} disabled={savingAlias}
                className="text-xs font-semibold px-3 py-2 rounded-lg" style={{ width: "auto", background: "var(--court-blue)", color: "var(--court-blue-ink)" }}>
                {savingAlias ? "…" : "Save"}
              </button>
              <button type="button" onClick={() => setEditingAlias(false)} disabled={savingAlias}
                className="text-xs font-semibold px-3 py-2 rounded-lg" style={{ width: "auto", color: "var(--slate)" }}>
                Cancel
              </button>
            </div>
          ) : (
            <button type="button"
              onClick={() => { setAliasInput((event.organizerAliases || {})[myUid] || ""); setEditingAlias(true); }}
              className="text-xs font-semibold mb-3"
              style={{ width: "auto", color: "var(--slate)", textDecoration: "underline" }}>
              {(event.organizerAliases || {})[myUid] ? "Change how you're shown as organizer" : "Show a different name as organizer"}
            </button>
          )
        ) : null}

        {isOrganizer && organizers.length < 4 && participants.some(([uid]) => !organizers.includes(uid)) ? (
          <div className="flex flex-wrap gap-1.5 mb-3">
            {participants.filter(([uid]) => !organizers.includes(uid)).map(([uid, pname]) => (
              <button key={uid} type="button" onClick={() => makeOrganizer(uid, pname)}
                className="text-xs font-semibold px-3 py-1 rounded-full"
                style={{ width: "auto", border: "1px dashed var(--line-strong)", color: "var(--slate)" }}>
                + Make {pname} an organizer
              </button>
            ))}
          </div>
        ) : null}

        {isOrganizer && organizers.length < 4 ? (
          <React.Fragment>
            <div style={{ height: 1, background: "var(--line)", margin: "12px 0" }} />
            <div className="text-xs font-semibold mb-2" style={{ color: "var(--slate)" }}>
              Or invite someone by phone — they don't need to be a player
            </div>
            {canPickContact ? (
              <button type="button" onClick={handlePickOrganizerContact}
                className="text-xs font-semibold px-3 py-1.5 rounded-lg mb-2"
                style={{ width: "auto", border: "1px solid var(--line)", color: "var(--slate)" }}>
                Pick from contacts
              </button>
            ) : null}
            <div className="flex gap-2 mb-2">
              <input type="tel" value={orgPhone} onChange={(e) => setOrgPhone(e.target.value)} placeholder="+91..."
                className="flex-1 px-3 py-2.5 rounded-lg text-sm"
                style={{ border: "1px solid var(--line)", background: "var(--chalk)", color: "var(--ink)" }} />
              <input type="text" value={orgName} onChange={(e) => setOrgName(e.target.value)} placeholder="Name (optional)"
                className="flex-1 px-3 py-2.5 rounded-lg text-sm"
                style={{ border: "1px solid var(--line)", background: "var(--chalk)", color: "var(--ink)" }} />
            </div>
            <button type="button" onClick={handleInviteOrganizer} disabled={sendingOrgInvite}
              className="w-full py-2.5 rounded-xl text-sm font-semibold"
              style={{ border: "1.5px solid var(--line)", color: "var(--ink)" }}>
              {sendingOrgInvite ? "Sending…" : "Invite as organizer"}
            </button>
            {lastOrgInvite ? (
              <a href={buildWhatsAppLink(lastOrgInvite.phone, buildEventInviteMessage(event, lastOrgInvite.name, true))}
                target="_blank" rel="noopener" style={whatsAppButtonStyle}>
                Open WhatsApp to let them know
              </a>
            ) : null}
          </React.Fragment>
        ) : null}
      </div>

      <div className="rally-card p-4 mb-5">
        <div className="flex items-center justify-between mb-3">
          <span className="text-sm font-bold" style={{ color: "var(--ink)" }}>
            {(event.participants || []).length} / {event.capacity} joined
          </span>
          <span className="rally-chip px-3 py-1 text-xs font-semibold" style={{ color: "var(--slate)" }}>
            {spotsLeft > 0 ? `${spotsLeft} spot${spotsLeft === 1 ? "" : "s"} left` : "Full — generating draw…"}
          </span>
        </div>
        <div className="flex flex-wrap gap-1.5 mb-2">
          {participants.filter(([uid]) => (event.participants || []).includes(uid)).map(([uid, pname]) => {
            const canRemove = uid === myUid || isOrganizer;
            if (editingUid === uid) {
              return (
                <span key={uid} className="flex items-center gap-1.5 px-2 py-1 rounded-full" style={{ background: "var(--card)", border: "1px solid var(--court-blue)" }}>
                  <input type="text" value={editNameValue} onChange={(e) => setEditNameValue(e.target.value)} autoFocus
                    style={{ width: "90px", background: "transparent", color: "var(--ink)", fontSize: "0.8rem", fontWeight: 600, border: "none", outline: "none" }} />
                  <button type="button" onClick={handleSaveEdit} disabled={savingEdit}
                    style={{ width: "auto", color: "var(--court-blue)", fontWeight: 700, fontSize: "0.8rem" }}>✓</button>
                  <button type="button" onClick={() => setEditingUid(null)}
                    style={{ width: "auto", color: "var(--slate)", fontWeight: 700, fontSize: "0.8rem" }}>&times;</button>
                </span>
              );
            }
            return (
              <span key={uid} className="rally-chip px-3 py-1 text-xs font-semibold flex items-center gap-1.5" style={{ color: "var(--ink)" }}>
                {isOrganizer ? (
                  <button type="button" onClick={() => startEditingName(uid, pname)}
                    style={{ width: "auto", color: "inherit", fontWeight: "inherit", fontSize: "inherit" }}>
                    {pname}{organizers.includes(uid) ? " ★" : ""}
                  </button>
                ) : (
                  <React.Fragment>{pname}{organizers.includes(uid) ? " ★" : ""}</React.Fragment>
                )}
                {canRemove ? (
                  <button type="button"
                    onClick={() => (uid === myUid ? handleLeaveAsPlayer() : handleRemoveParticipant(uid))}
                    disabled={leaving || removingUid === uid}
                    style={{ width: "auto", color: "var(--danger)", fontWeight: 700 }}
                    aria-label={uid === myUid ? "Remove yourself as a player" : `Remove ${pname} as a player`}>
                    &times;
                  </button>
                ) : null}
              </span>
            );
          })}
        </div>
        {isOrganizer ? (
          <div className="text-xs" style={{ color: "var(--slate)" }}>
            Organizers can tap a name to edit it{iAmParticipant ? ", or the × on your own to stop playing." : "."}
          </div>
        ) : iAmParticipant ? (
          <div className="text-xs" style={{ color: "var(--slate)" }}>
            Not playing after all? Tap the × on your own name.
          </div>
        ) : null}
      </div>

      {isOrganizer && (sentPlayerInvites.some((i) => i.status !== "accepted") || sentOrgInvites.some((i) => i.status !== "accepted")) ? (
        <div className="rally-card p-4 mb-5">
          <div className="text-sm font-bold mb-3" style={{ color: "var(--ink)" }}>Sent invitations</div>
          {sentPlayerInvites.filter((i) => i.status !== "accepted").map((inv) => (
            <div key={"p_" + inv.id} className="flex items-center justify-between py-1.5">
              <span className="text-sm" style={{ color: "var(--ink)" }}>{inv.invitedName || inv.invitedPhone} <span style={{ color: "var(--slate)" }}>· player</span></span>
              <span className="rally-chip px-3 py-1 text-xs font-semibold"
                style={inv.status === "declined" ? { color: "var(--danger)" } : { color: "var(--slate)" }}>
                {inv.status === "declined" ? "Declined" : "Pending"}
              </span>
            </div>
          ))}
          {sentOrgInvites.filter((i) => i.status !== "accepted").map((inv) => (
            <div key={"o_" + inv.id} className="flex items-center justify-between py-1.5">
              <span className="text-sm" style={{ color: "var(--ink)" }}>{inv.invitedName || inv.invitedPhone} <span style={{ color: "var(--slate)" }}>· organizer</span></span>
              <span className="rally-chip px-3 py-1 text-xs font-semibold"
                style={inv.status === "declined" ? { color: "var(--danger)" } : { color: "var(--slate)" }}>
                {inv.status === "declined" ? "Declined" : "Pending"}
              </span>
            </div>
          ))}
        </div>
      ) : null}

      {isOrganizer && spotsLeft > 0 ? (
        <div className="rally-card p-4 mb-5">
          <div className="text-sm font-bold mb-1" style={{ color: "var(--ink)" }}>Add a player directly</div>
          <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
            For anyone confirming offline — courtside or over a call. They're added straight away, no invite or app needed on their end. As an organizer, you can still edit or remove them later.
          </div>
          {guestError ? (
            <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
              {guestError}
            </div>
          ) : null}
          <div className="flex gap-2">
            <input type="text" value={guestName} onChange={(e) => setGuestName(e.target.value)} placeholder="Their name"
              className="flex-1 px-3 py-2.5 rounded-lg text-sm"
              style={{ border: "1px solid var(--line)", background: "var(--chalk)", color: "var(--ink)" }} />
            <button type="button" onClick={handleAddGuest} disabled={addingGuest}
              className="rally-btn-primary px-4 text-sm" style={{ width: "auto" }}>
              {addingGuest ? "…" : "Add"}
            </button>
          </div>
        </div>
      ) : null}

      {isOrganizer ? (
        <div className="rally-card p-4 mb-5">
          <div className="text-sm font-bold mb-3" style={{ color: "var(--ink)" }}>Invite someone to play</div>
          {error ? (
            <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
              {error}
            </div>
          ) : null}
          {canPickContact ? (
            <button type="button" onClick={handlePickPlayerContact}
              className="text-xs font-semibold px-3 py-1.5 rounded-lg mb-2"
              style={{ width: "auto", border: "1px solid var(--line)", color: "var(--slate)" }}>
              Pick from contacts
            </button>
          ) : null}
          <div className="flex gap-2 mb-2">
            <input type="tel" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="+91..."
              className="flex-1 px-3 py-2.5 rounded-lg text-sm"
              style={{ border: "1px solid var(--line)", background: "var(--chalk)", color: "var(--ink)" }} />
            <input type="text" value={name} onChange={(e) => setName(e.target.value)} placeholder="Name (optional)"
              className="flex-1 px-3 py-2.5 rounded-lg text-sm"
              style={{ border: "1px solid var(--line)", background: "var(--chalk)", color: "var(--ink)" }} />
          </div>
          <button type="button" onClick={handleInvite} disabled={sending} className="rally-btn-primary w-full py-2.5 text-sm">
            {sending ? "Sending…" : "Send invite"}
          </button>
          {lastPlayerInvite ? (
            <a href={buildWhatsAppLink(lastPlayerInvite.phone, buildEventInviteMessage(event, lastPlayerInvite.name, false))}
              target="_blank" rel="noopener" style={whatsAppButtonStyle}>
              Open WhatsApp to let them know
            </a>
          ) : null}
        </div>
      ) : null}
    </div>
  );
}

function EventTeamLabel({ players, ids, winning, align = "left" }) {
  return (
    <div className={"min-w-0 flex-1" + (align === "right" ? " text-right" : "")}>
      {ids.map((id) => (
        <div key={id} className="text-sm font-bold truncate"
          style={{
            color: winning ? "var(--court-blue-highlight)" : "var(--court-blue-ink)",
            opacity: winning ? 1 : 0.75,
            transition: "color 0.3s ease",
          }}>
          {playerName(players, id)}
        </div>
      ))}
    </div>
  );
}

// Defined once, at module level — not inside EventCourtCard. That
// distinction is the actual fix for the cursor-jumping-mid-typing bug:
// a component declared inside another component's body gets recreated
// as a brand new function on every render, and React treats a new
// function reference as a different component type even when the code
// is identical. That forces the underlying <input> DOM node to
// unmount and remount on every keystroke, which is what was silently
// destroying cursor position each time — nothing to do with the input
// element itself, entirely about where this was declared.
function ScoreDisplay({ value, editing, onChange, ariaLabel }) {
  return editing ? (
    <input inputMode="numeric" pattern="[0-9]*" className="rally-score-input rally-tabular"
      value={value == null ? "" : String(value)} onChange={onChange}
      placeholder="0" aria-label={ariaLabel} />
  ) : (
    <span className="rally-score-input rally-tabular" style={{ display: "flex", alignItems: "center", justifyContent: "center" }}>
      {value == null ? "–" : value}
    </span>
  );
}

function EventCourtCard({ court, players, editing, draftA, draftB, onChangeA, onChangeB }) {
  const displayA = editing ? draftA : court.scoreA;
  const displayB = editing ? draftB : court.scoreB;
  const aWins = !editing && displayA != null && displayB != null && displayA > displayB;
  const bWins = !editing && displayA != null && displayB != null && displayB > displayA;

  return (
    <div className="rally-court-card p-4">
      <div className="text-xs font-bold uppercase mb-3" style={{ color: "var(--court-blue-ink)", opacity: 0.75 }}>
        Court {court.court}
      </div>
      <div className="flex items-center justify-between gap-3">
        <EventTeamLabel players={players} ids={court.teamA} winning={aWins} />
        <ScoreDisplay value={displayA} editing={editing} onChange={onChangeA} ariaLabel="Team A score" />
      </div>
      <div className="rally-net-line my-3" />
      <div className="flex items-center justify-between gap-3">
        <ScoreDisplay value={displayB} editing={editing} onChange={onChangeB} ariaLabel="Team B score" />
        <EventTeamLabel players={players} ids={court.teamB} winning={bWins} align="right" />
      </div>
    </div>
  );
}

function EventRoundBlock({ round, roundIndex, totalRounds, players, dispatch, expanded, onToggle, pointsTarget, eventId, editable }) {
  const complete = roundIsComplete(round);
  // Only used to seed the very first render, same reasoning as
  // before: this device's own edit/confirm taps control it from
  // here, deliberately not re-synced from remote confirmed changes.
  const [editing, setEditing] = useState(!complete && editable);
  const [drafts, setDrafts] = useState(() => {
    const m = {};
    round.courts.forEach((c) => { m[c.court] = { scoreA: c.scoreA, scoreB: c.scoreB }; });
    return m;
  });

  const allFilled = round.courts.every((c) => {
    const d = drafts[c.court];
    return d && d.scoreA != null && d.scoreB != null;
  });

  // Every keystroke still saves to Firestore, debounced, same as
  // before — that's what makes closing the app mid-type safe. Local
  // drafts state is what the round's cards actually display while
  // editing; nothing here touches confirmed until the round-level
  // Confirm button below is actually tapped.
  const handleDraftChange = (courtNumber, field, value) => {
    setDrafts((prev) => ({ ...prev, [courtNumber]: { ...prev[courtNumber], [field]: value } }));
    syncPadelScoreField(eventId, roundIndex, courtNumber, field, value);
  };

  const handleConfirm = () => {
    const courtScores = round.courts.map((c) => ({ court: c.court, ...drafts[c.court] }));
    const courtPatches = {};
    courtScores.forEach((s) => { courtPatches[s.court] = { scoreA: s.scoreA, scoreB: s.scoreB, confirmed: true }; });
    dispatch({ roundIndex, courtPatches });
    confirmRoundScores(eventId, roundIndex, courtScores);
    setEditing(false);
  };

  const handleEdit = () => {
    const m = {};
    const courtPatches = {};
    round.courts.forEach((c) => {
      m[c.court] = { scoreA: c.scoreA, scoreB: c.scoreB };
      courtPatches[c.court] = { confirmed: false };
    });
    setDrafts(m);
    setEditing(true);
    dispatch({ roundIndex, courtPatches });
    unconfirmRoundScores(eventId, roundIndex);
  };

  return (
    <div className="mb-4 rally-fade-in">
      <button type="button" onClick={onToggle} className="w-full flex items-center justify-between py-2.5 px-1"
        style={{ borderBottom: expanded ? "1px solid var(--line)" : "1px solid transparent" }}>
        <div className="flex items-center gap-2">
          <span className="rally-display text-base" style={{ color: "var(--ink)" }}>Round {roundIndex + 1}</span>
          <span className="text-xs" style={{ color: "var(--slate)" }}>of {totalRounds}</span>
          {complete ? (
            <span className="w-4 h-4 rounded-full flex items-center justify-center" style={{ background: "var(--court-blue)", color: "var(--court-blue-ink)", fontSize: "10px", fontWeight: 700 }}>
              &#10003;
            </span>
          ) : null}
        </div>
        <span style={{ color: "var(--slate)" }}>{expanded ? "▴" : "▾"}</span>
      </button>

      {expanded ? (
        <div className="rally-fade-in">
          <div className="text-xs mt-3 mb-3 px-1" style={{ color: "var(--slate)" }}>Playing to {pointsTarget} pts</div>
          <div className="grid gap-3 sm:grid-cols-2">
            {round.courts.map((court) => (
              <EventCourtCard key={court.court} court={court} players={players} editing={editing}
                draftA={drafts[court.court] ? drafts[court.court].scoreA : null}
                draftB={drafts[court.court] ? drafts[court.court].scoreB : null}
                onChangeA={(e) => {
                  const digits = e.target.value.replace(/[^0-9]/g, "").slice(0, 3);
                  handleDraftChange(court.court, "scoreA", digits === "" ? null : parseInt(digits, 10));
                }}
                onChangeB={(e) => {
                  const digits = e.target.value.replace(/[^0-9]/g, "").slice(0, 3);
                  handleDraftChange(court.court, "scoreB", digits === "" ? null : parseInt(digits, 10));
                }} />
            ))}
          </div>
          {round.sittingOut && round.sittingOut.length ? (
            <div className="text-xs mt-3 px-1" style={{ color: "var(--slate)" }}>
              Resting: {round.sittingOut.map((id) => playerName(players, id)).join(", ")}
            </div>
          ) : null}
          {editable ? (
            editing ? (
              <button type="button" onClick={handleConfirm} disabled={!allFilled}
                className="w-full py-2.5 rounded-lg text-sm font-bold"
                style={{ marginTop: "16px", background: "var(--chip-solid)", color: "var(--chip-solid-ink)", opacity: allFilled ? 1 : 0.5 }}>
                Confirm round {roundIndex + 1}
              </button>
            ) : (
              <button type="button" onClick={handleEdit}
                className="w-full py-2.5 rounded-lg text-sm font-semibold"
                style={{ marginTop: "16px", border: "1px solid var(--line-strong)", color: "var(--slate)" }}>
                Edit round {roundIndex + 1}
              </button>
            )
          ) : null}
        </div>
      ) : (
        <div className="px-1 pb-1">
          {round.courts.map((court) => (
            <div key={court.court} className="text-xs py-0.5 truncate" style={{ color: "var(--slate)" }}>
              C{court.court}: {court.teamA.map((id) => playerName(players, id)).join(" & ")}{" "}
              <span className="rally-tabular font-semibold" style={{ color: "var(--ink)" }}>
                {courtScoreIsFinal(court) ? court.scoreA : "–"}–{courtScoreIsFinal(court) ? court.scoreB : "–"}
              </span>{" "}
              {court.teamB.map((id) => playerName(players, id)).join(" & ")}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function EventStandings({ tournament }) {
  const standings = useMemo(
    () => computeStandings(tournament.players, tournament.rounds || []),
    [tournament.players, tournament.rounds]
  );
  return (
    <div className="max-w-xl mx-auto px-4 pb-28">
      <div className="rally-card overflow-hidden">
        <table className="w-full text-sm" style={{ borderCollapse: "collapse" }}>
          <thead>
            <tr style={{ borderBottom: "1px solid var(--line)" }}>
              <th className="text-left py-2.5 px-3 text-xs font-semibold" style={{ color: "var(--slate)" }}>#</th>
              <th className="text-left py-2.5 px-3 text-xs font-semibold" style={{ color: "var(--slate)" }}>Player</th>
              <th className="text-right py-2.5 px-3 text-xs font-semibold" style={{ color: "var(--slate)" }}>Pts</th>
              <th className="text-right py-2.5 px-3 text-xs font-semibold" style={{ color: "var(--slate)" }}>+/-</th>
              <th className="text-right py-2.5 px-3 text-xs font-semibold" style={{ color: "var(--slate)" }}>W</th>

          <tbody>
            {standings.map((s, i) => (
              <tr key={s.id} style={{ borderBottom: i < standings.length - 1 ? "1px solid var(--line)" : "none" }}>
                <td className="py-2.5 px-3 text-xs font-bold rally-tabular" style={{ color: "var(--slate)" }}>{i + 1}</td>
                <td className="py-2.5 px-3 text-sm font-semibold" style={{ color: "var(--ink)" }}>{s.name}</td>

                <td className="py-2.5 px-3 text-xs text-right rally-tabular" style={{ color: "var(--slate)" }}>{s.diff > 0 ? "+" : ""}{s.diff}</td>

function EventFull({ event, eventId, isOrganizer }) {
  const [tournament, setTournament] = useState(null);
  const [fullDraw, setFullDraw] = useState(null);
  const [activeTab, setActiveTab] = useState("play");
  const [expandedIdx, setExpandedIdx] = useState(0);
  const [, forceRender] = useState(0);
  const [confirmingRegen, setConfirmingRegen] = useState(false);
  const [regenerating, setRegenerating] = useState(false);
  const [regenError, setRegenError] = useState("");
  const [showUpcoming, setShowUpcoming] = useState(false);
  const [editingRounds, setEditingRounds] = useState(false);
  const [roundsInput, setRoundsInput] = useState(event.numRounds);
  const [savingRounds, setSavingRounds] = useState(false);
  const [roundsError, setRoundsError] = useState("");

  useEffect(() => {
    const unsub = watchPadelTournament(eventId, (t) => setTournament(t), () => {});
    return () => unsub();
  }, [eventId]);

  // Only ever succeeds for an actual organizer — the rules deny this
  // outright for anyone else, so a permission error here for a
  // regular participant is the expected, correct behavior, not
  // something to surface as a problem.
  useEffect(() => {
    if (!isOrganizer) { setFullDraw(null); return; }
    const unsub = watchPadelFullDraw(eventId, (d) => setFullDraw(d), () => setFullDraw(null));
    return () => unsub();
  }, [eventId, isOrganizer]);

  const anyScoresEntered = tournament && tournament.rounds.some((r) =>
    r.courts.some((c) => c.scoreA != null || c.scoreB != null));

  const handleRegenerate = async () => {
    setRegenerating(true);
    setRegenError("");
    try {
      await regenerateDraw(eventId);
      setConfirmingRegen(false);
    } catch (e) {
      setRegenError(e && e.message ? e.message : "Could not regenerate the draw.");
    } finally {
      setRegenerating(false);
    }
  };

  const handleSaveRounds = async () => {
    const n = Number(roundsInput);
    if (!n || n < 1) return setRoundsError("Enter at least 1 round.");
    setSavingRounds(true);
    setRoundsError("");
    try {
      await updatePadelEvent(eventId, { numRounds: n });
      setEditingRounds(false);
    } catch (e) {
      setRoundsError(e && e.message ? e.message : "Could not save that.");
    } finally {
      setSavingRounds(false);
    }
  };

  if (!tournament) {
    return (
      <div className="max-w-xl mx-auto px-4 pb-28 text-center" style={{ color: "var(--slate)" }}>
        <p className="text-sm" style={{ marginTop: "2rem" }}>Everyone's in — generating the draw now. This usually takes a few seconds.</p>
      </div>
    );
  }

  // Local, optimistic score updates so the input feels instant while
  // syncPadelScoreField's debounced transaction catches up in the
  // background — the live listener above will reconcile shortly after.
  const dispatch = ({ roundIndex, courtPatches }) => {
    setTournament((prev) => {
      if (!prev) return prev;
      const rounds = prev.rounds.map((r, ri) => {
        if (ri !== roundIndex) return r;
        return { ...r, courts: r.courts.map((c) => (courtPatches[c.court] ? { ...c, ...courtPatches[c.court] } : c)) };
      });
      return { ...prev, rounds };
    });
  };

  return (
    <div className="max-w-xl mx-auto px-4 pb-28">
      {!isOrganizer ? (
        <div className="text-xs mb-4 px-3 py-2 rounded-lg" style={{ background: "var(--chalk)", color: "var(--slate)" }}>
          Only organizers can update scores in this Events view. The full-screen live page lets every participant enter scores.
        </div>
      ) : null}

      {event.capacity === 8 && event.numRounds === 7 ? (
        <a href={`americano-8-player-event.html?event=${encodeURIComponent(eventId)}`}
          className="rally-card p-4 mb-5 block" style={{ textDecoration: "none", borderColor: "var(--court-blue)" }}>
          <div className="text-sm font-bold mb-1" style={{ color: "var(--ink)" }}>Open the full-screen live event page</div>
          <div className="text-xs" style={{ color: "var(--slate)" }}>
            Share this page with the eight players. Scores and standings update from the same Firebase event in real time.
          </div>
        </a>
      ) : null}

      {isOrganizer ? (
        <div className="rally-card p-4 mb-5">
          <div className="text-sm font-bold mb-1" style={{ color: "var(--ink)" }}>Rounds</div>
          <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
            Set this before editing players — regenerating happens right away once the event is full again.
          </div>
          {roundsError ? (
            <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
              {roundsError}
            </div>
          ) : null}
          {editingRounds ? (
            <div className="flex gap-2 items-center">
              <input type="number" min="1" step="1" value={roundsInput} onChange={(e) => setRoundsInput(e.target.value)}
                className="px-3 py-2 rounded-lg text-sm rally-tabular"
                style={{ width: "80px", border: "1px solid var(--line)", background: "var(--chalk)", color: "var(--ink)" }} />
              <button type="button" onClick={handleSaveRounds} disabled={savingRounds}
                className="text-xs font-semibold px-3 py-2 rounded-lg" style={{ width: "auto", background: "var(--court-blue)", color: "var(--court-blue-ink)" }}>
                {savingRounds ? "…" : "Save"}
              </button>
              <button type="button" onClick={() => setEditingRounds(false)} disabled={savingRounds}
                className="text-xs font-semibold px-3 py-2 rounded-lg" style={{ width: "auto", color: "var(--slate)" }}>
                Cancel
              </button>
            </div>
          ) : (
            <div className="flex items-center gap-2">
              <span className="text-sm" style={{ color: "var(--ink)" }}>{event.numRounds} rounds</span>
              <button type="button" onClick={() => { setRoundsInput(event.numRounds); setEditingRounds(true); }}
                className="text-xs font-semibold" style={{ width: "auto", color: "var(--slate)", textDecoration: "underline" }}>
                Change
              </button>
            </div>
          )}
        </div>
      ) : null}

      {isOrganizer ? (
        <div className="rally-card p-4 mb-5">
          {regenError ? (
            <div className="text-xs font-semibold mb-3 px-3 py-2 rounded-lg" style={{ background: "var(--danger-light)", color: "var(--danger)" }}>
              {regenError}
            </div>
          ) : null}
          {!anyScoresEntered ? (
            <React.Fragment>
              <div className="text-sm font-bold mb-1" style={{ color: "var(--ink)" }}>Need to swap a player?</div>
              <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
                No scores entered yet, so there's nothing to lose — this takes you back to add or remove players,
                then makes a fresh draw automatically once it's full again.
              </div>
              <button type="button" onClick={handleRegenerate} disabled={regenerating}
                className="w-full py-2.5 rounded-xl text-sm font-semibold" style={{ border: "1.5px solid var(--line)", color: "var(--ink)" }}>
                {regenerating ? "…" : "Edit players"}
              </button>
            </React.Fragment>
          ) : confirmingRegen ? (
            <React.Fragment>
              <div className="text-sm font-bold mb-1" style={{ color: "var(--danger)" }}>Regenerate draw</div>
              <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
                Scores have already been entered — regenerating clears every one of them, and there's no undo.
              </div>
              <div className="flex gap-2">
                <button type="button" onClick={handleRegenerate} disabled={regenerating}
                  className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{ background: "var(--danger)", color: "#fff" }}>
                  {regenerating ? "Regenerating…" : "Yes, regenerate"}
                </button>
                <button type="button" onClick={() => setConfirmingRegen(false)} disabled={regenerating}
                  className="flex-1 py-2.5 rounded-xl text-sm font-semibold" style={{ border: "1.5px solid var(--line)", color: "var(--slate)" }}>
                  Cancel
                </button>
              </div>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <div className="text-sm font-bold mb-1" style={{ color: "var(--ink)" }}>Need to swap a player?</div>
              <div className="text-xs mb-3" style={{ color: "var(--slate)" }}>
                Scores have already been entered for this event — editing players means regenerating the draw,
                which clears everything entered so far.
              </div>
              <button type="button" onClick={() => setConfirmingRegen(true)}
                className="w-full py-2.5 rounded-xl text-sm font-semibold" style={{ border: "1.5px solid var(--line)", color: "var(--ink)" }}>
                Edit players
              </button>
            </React.Fragment>
          )}
        </div>
      ) : null}

      <div className="flex gap-2 mb-5 rounded-xl" style={{ background: "var(--card)", border: "1px solid var(--line)", padding: "0.25rem" }}>
        <button type="button" onClick={() => setActiveTab("play")}
          className={"rally-tab-btn flex-1 py-2 text-sm" + (activeTab === "play" ? " active" : "")}>
          Scores
        </button>
        <button type="button" onClick={() => setActiveTab("standings")}
          className={"rally-tab-btn flex-1 py-2 text-sm" + (activeTab === "standings" ? " active" : "")}>
          Standings
        </button>
      </div>

      {isOrganizer && fullDraw && fullDraw.rounds.length > tournament.rounds.length ? (
        <div className="rally-card p-4 mb-5">
          <button type="button" onClick={() => setShowUpcoming(!showUpcoming)}
            className="text-sm font-bold w-full text-left flex items-center justify-between" style={{ color: "var(--ink)" }}>
            <span>Peek ahead — rounds {tournament.rounds.length + 1}–{fullDraw.rounds.length}</span>
            <span style={{ color: "var(--slate)" }}>{showUpcoming ? "▲" : "▼"}</span>
          </button>
          <div className="text-xs" style={{ color: "var(--slate)", marginTop: "4px" }}>
            Only you can see these — everyone else finds out one round at a time, as each one finishes.
          </div>
          {showUpcoming ? (
            <div className="mt-3" style={{ borderTop: "1px solid var(--line)", paddingTop: "0.75rem" }}>
              {fullDraw.rounds.slice(tournament.rounds.length).map((round, i) => (
                <div key={i} className="mb-2.5">
                  <div className="text-xs font-bold mb-1" style={{ color: "var(--slate)" }}>
                    Round {tournament.rounds.length + i + 1}
                  </div>
                  {round.courts.map((court) => (
                    <div key={court.court} className="text-xs py-0.5" style={{ color: "var(--ink)" }}>
                      C{court.court}: {court.teamA.map((id) => playerName(fullDraw.players, id)).join(" & ")}
                      {" vs "}
                      {court.teamB.map((id) => playerName(fullDraw.players, id)).join(" & ")}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          ) : null}
        </div>
      ) : null}

      {activeTab === "play" ? (
        tournament.rounds.map((round, idx) => (
          <EventRoundBlock key={idx} round={round} roundIndex={idx} totalRounds={tournament.rounds.length}
            players={tournament.players} dispatch={dispatch} expanded={expandedIdx === idx}
            onToggle={() => setExpandedIdx(expandedIdx === idx ? -1 : idx)}
            pointsTarget={tournament.pointsTarget} eventId={eventId} editable={isOrganizer} />
        ))
      ) : (
        <EventStandings tournament={tournament} />
      )}
    </div>
  );
}
