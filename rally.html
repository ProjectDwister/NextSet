/* ============================================================
   LIVE SYNC — Firestore, gated by Court Pop's own sign-in. Reuses
   the exact same Firebase project as the rest of the app (see
   firebase-config.js) instead of a separate setup, and requires
   a signed-in Court Pop user before anything loads — no local-only
   fallback anymore, since being signed out now just means "go
   sign in on the main page first."
   ============================================================ */

import { auth, db } from './firebase-config.js';
import { getMyProfile, updateMyProfileName, signOutUser } from './auth.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';
import {
  collection, doc, setDoc, onSnapshot, serverTimestamp, runTransaction,
} from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';

const { useEffect, useMemo, useReducer, useRef, useState } = React;

function getTournamentIdFromUrl() {
  return new URLSearchParams(location.search).get('t');
}

// A tournament is created the moment one is needed and none is in the
// URL yet — its id is pushed into the URL immediately after, so copying
// the link from that point on always points back at this same, live
// tournament for any other signed-in Court Pop user who opens it.
async function ensureTournamentId(uid) {
  const existing = getTournamentIdFromUrl();
  if (existing) return existing;
  const ref = doc(collection(db, 'tournaments'));
  await setDoc(ref, {
    ...initialState,
    createdBy: uid,
    createdAt: serverTimestamp(),
    updatedAt: serverTimestamp(),
  });
  const url = new URL(location.href);
  url.searchParams.set('t', ref.id);
  history.replaceState(null, '', url);
  return ref.id;
}

// Concurrent score entry (two different courts, same moment) is the one
// case multiple courtside phones are likely to actually collide on.
// Firestore can't address into an array by position the way Realtime
// Database's path-based updates could (rounds/courts are arrays, and
// Firestore's dot-notation updates only work into maps) — this uses a
// transaction instead, for the same correctness guarantee (nobody's
// score edit gets silently lost), just as a read-modify-write rather
// than a single targeted field path.
const scoreSyncTimers = {};
function syncScoreFieldToFirestore(tournamentId, roundIdx, courtNumber, field, value) {
  if (!tournamentId) return;
  const key = roundIdx + ":" + courtNumber + ":" + field;
  if (scoreSyncTimers[key]) clearTimeout(scoreSyncTimers[key]);
  scoreSyncTimers[key] = setTimeout(async () => {
    try {
      const ref = doc(db, 'tournaments', tournamentId);
      await runTransaction(db, async (tx) => {
        const snap = await tx.get(ref);
        if (!snap.exists()) return;
        const data = snap.data();
        const rounds = (data.rounds || []).map((r, ri) => {
          if (ri !== roundIdx) return r;
          return {
            ...r,
            courts: (r.courts || []).map((c) => (c.court !== courtNumber ? c : { ...c, [field]: value })),
          };
        });
        tx.update(ref, { rounds, updatedAt: serverTimestamp() });
      });
    } catch (e) {
      // Non-fatal — the debounced whole-state save (below) or this
      // field's next edit reconciles it. Locally, the score already
      // reflects the change either way, since the reducer ran
      // synchronously on click, independent of this sync call.
    }
  }, 150);
}

/* ============================================================
   SCHEDULING ENGINE
   (Pure functions, no framework dependencies. Tested standalone
   before being wired into the UI below.)
   ============================================================ */

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pairKey(a, b) {
  return a < b ? `${a}|${b}` : `${b}|${a}`;
}

function buildHistory(players, rounds) {
  const partnerCount = {};
  const opponentCount = {};
  const gamesPlayed = {};
  const sitOutCount = {};
  players.forEach((p) => {
    gamesPlayed[p.id] = 0;
    sitOutCount[p.id] = 0;
  });

  rounds.forEach((round) => {
    round.courts.forEach((court) => {
      const [a1, a2] = court.teamA;
      const [b1, b2] = court.teamB;
      [a1, a2, b1, b2].forEach((id) => {
        gamesPlayed[id] = (gamesPlayed[id] || 0) + 1;
      });
      const pk1 = pairKey(a1, a2);
      partnerCount[pk1] = (partnerCount[pk1] || 0) + 1;
      const pk2 = pairKey(b1, b2);
      partnerCount[pk2] = (partnerCount[pk2] || 0) + 1;
      [a1, a2].forEach((x) =>
        [b1, b2].forEach((y) => {
          const ok = pairKey(x, y);
          opponentCount[ok] = (opponentCount[ok] || 0) + 1;
        })
      );
    });
    (round.sittingOut || []).forEach((id) => {
      sitOutCount[id] = (sitOutCount[id] || 0) + 1;
    });
  });

  return { partnerCount, opponentCount, gamesPlayed, sitOutCount };
}

function computeActiveCount(numPlayers, numCourts) {
  const maxSlots = numCourts * 4;
  return Math.floor(Math.min(numPlayers, maxSlots) / 4) * 4;
}

function chooseSitOuts(players, history, numSitOut) {
  if (numSitOut <= 0) return [];
  const sorted = [...players].sort((a, b) => {
    const soDiff = (history.sitOutCount[a.id] || 0) - (history.sitOutCount[b.id] || 0);
    if (soDiff !== 0) return soDiff;
    const gpDiff = (history.gamesPlayed[b.id] || 0) - (history.gamesPlayed[a.id] || 0);
    if (gpDiff !== 0) return gpDiff;
    return Math.random() - 0.5;
  });
  return sorted.slice(0, numSitOut);
}

function pairHistoryScore(idA, idB, history, partnerWeight, opponentWeight) {
  const pk = pairKey(idA, idB);
  return (history.partnerCount[pk] || 0) * partnerWeight + (history.opponentCount[pk] || 0) * opponentWeight;
}

function splitByGender(players) {
  return {
    men: players.filter((p) => p.gender === "M"),
    women: players.filter((p) => p.gender === "F"),
    other: players.filter((p) => p.gender !== "M" && p.gender !== "F"),
  };
}

function selectActiveForRound(players, numCourts, history, mixedMode) {
  if (!mixedMode) {
    const activeCount = computeActiveCount(players.length, numCourts);
    const numSitOut = players.length - activeCount;
    const sittingOut = chooseSitOuts(players, history, numSitOut);
    const sitOutIds = new Set(sittingOut.map((p) => p.id));
    return { active: players.filter((p) => !sitOutIds.has(p.id)), sittingOut };
  }

  const { men, women, other } = splitByGender(players);
  const maxTeamsByCourts = numCourts * 2;
  let targetTeams = Math.min(men.length, women.length, maxTeamsByCourts);
  targetTeams -= targetTeams % 2;
  targetTeams = Math.max(0, targetTeams);

  const sitOutMen = chooseSitOuts(men, history, men.length - targetTeams);
  const sitOutWomen = chooseSitOuts(women, history, women.length - targetTeams);
  const sittingOut = [...sitOutMen, ...sitOutWomen, ...other];
  const sitOutIds = new Set(sittingOut.map((p) => p.id));
  const active = players.filter((p) => !sitOutIds.has(p.id));
  return { active, sittingOut, targetTeams };
}

function groupConflictScore(group, history) {
  let score = 0;
  for (let i = 0; i < group.length; i++) {
    for (let j = i + 1; j < group.length; j++) {
      score += pairHistoryScore(group[i].id, group[j].id, history, 2, 1);
    }
  }
  return score;
}

function groupIntoFoursomes(activePlayers, history, attempts = 80) {
  let best = null;
  let bestScore = Infinity;

  for (let a = 0; a < attempts; a++) {
    const pool = shuffle(activePlayers);
    const groups = [];
    while (pool.length > 0) {
      const group = [pool.shift()];
      while (group.length < 4 && pool.length > 0) {
        let bestIdx = 0;
        let bestConflict = Infinity;
        for (let i = 0; i < pool.length; i++) {
          let c = 0;
          for (const g of group) {
            c += pairHistoryScore(g.id, pool[i].id, history, 2, 1);
          }
          if (c < bestConflict) {
            bestConflict = c;
            bestIdx = i;
          }
        }
        group.push(pool.splice(bestIdx, 1)[0]);
      }
      groups.push(group);
    }
    const totalScore = groups.reduce((sum, g) => sum + groupConflictScore(g, history), 0);
    if (totalScore < bestScore) {
      bestScore = totalScore;
      best = groups;
    }
  }
  return best;
}

function bestTeamSplit(group, history) {
  const [w, x, y, z] = group;
  const splits = [
    { teamA: [w, x], teamB: [y, z] },
    { teamA: [w, y], teamB: [x, z] },
    { teamA: [w, z], teamB: [x, y] },
  ];

  const scored = splits.map((s) => {
    const partnerScore =
      pairHistoryScore(s.teamA[0].id, s.teamA[1].id, history, 1, 0) +
      pairHistoryScore(s.teamB[0].id, s.teamB[1].id, history, 1, 0);
    const opponentScore =
      pairHistoryScore(s.teamA[0].id, s.teamB[0].id, history, 0, 1) +
      pairHistoryScore(s.teamA[0].id, s.teamB[1].id, history, 0, 1) +
      pairHistoryScore(s.teamA[1].id, s.teamB[0].id, history, 0, 1) +
      pairHistoryScore(s.teamA[1].id, s.teamB[1].id, history, 0, 1);
    return { split: s, score: partnerScore * 5 + opponentScore };
  });

  scored.sort((a, b) => a.score - b.score);
  return scored[0].split;
}

function formMixedTeamsRandom(activeMen, activeWomen, history) {
  const men = shuffle(activeMen);
  const remainingWomen = shuffle(activeWomen);
  const teams = [];
  for (const m of men) {
    let bestIdx = 0;
    let bestScore = Infinity;
    for (let i = 0; i < remainingWomen.length; i++) {
      const s = pairHistoryScore(m.id, remainingWomen[i].id, history, 1, 0);
      if (s < bestScore) {
        bestScore = s;
        bestIdx = i;
      }
    }
    teams.push([m, remainingWomen.splice(bestIdx, 1)[0]]);
  }
  return teams;
}

function formMixedTeamsByRank(activeMen, activeWomen, rankIndex) {
  const menSorted = [...activeMen].sort((a, b) => rankIndex[a.id] - rankIndex[b.id]);
  const womenSorted = [...activeWomen].sort((a, b) => rankIndex[a.id] - rankIndex[b.id]);
  const k = menSorted.length;
  const teams = [];
  for (let i = 0; i < k; i++) {
    teams.push([menSorted[i], womenSorted[k - 1 - i]]);
  }
  return teams;
}

function pairTeamsIntoCourtsByHistory(teams, history, attempts = 60) {
  if (teams.length === 0) return [];
  let best = null;
  let bestScore = Infinity;
  for (let a = 0; a < attempts; a++) {
    const pool = shuffle(teams);
    const courts = [];
    while (pool.length > 0) {
      const t1 = pool.shift();
      let bestIdx = 0;
      let bestC = Infinity;
      for (let i = 0; i < pool.length; i++) {
        let c = 0;
        t1.forEach((p1) => pool[i].forEach((p2) => (c += pairHistoryScore(p1.id, p2.id, history, 0, 1))));
        if (c < bestC) {
          bestC = c;
          bestIdx = i;
        }
      }
      const t2 = pool.splice(bestIdx, 1)[0];
      courts.push([t1, t2]);
    }
    const totalScore = courts.reduce((sum, [t1, t2]) => {
      let c = 0;
      t1.forEach((p1) => t2.forEach((p2) => (c += pairHistoryScore(p1.id, p2.id, history, 0, 1))));
      return sum + c;
    }, 0);
    if (totalScore < bestScore) {
      bestScore = totalScore;
      best = courts;
    }
  }
  return best;
}

function pairTeamsIntoCourtsByStrength(teams, standings) {
  const pointsOf = (id) => {
    const s = standings.find((x) => x.id === id);
    return s ? s.points : 0;
  };
  const sorted = [...teams].sort((t1, t2) => {
    const s1 = pointsOf(t1[0].id) + pointsOf(t1[1].id);
    const s2 = pointsOf(t2[0].id) + pointsOf(t2[1].id);
    return s2 - s1;
  });
  const courts = [];
  for (let i = 0; i < sorted.length; i += 2) {
    courts.push([sorted[i], sorted[i + 1]]);
  }
  return courts;
}

function toCourts(courtPairs) {
  return courtPairs.map((pair, idx) => ({
    court: idx + 1,
    teamA: pair[0].map((p) => p.id),
    teamB: pair[1].map((p) => p.id),
    scoreA: null,
    scoreB: null,
  }));
}

function generateAmericanoRound(players, numCourts, priorRounds, mixedMode) {
  const history = buildHistory(players, priorRounds);
  const { active, sittingOut } = selectActiveForRound(players, numCourts, history, mixedMode);

  if (mixedMode) {
    const { men, women } = splitByGender(active);
    const teams = formMixedTeamsRandom(men, women, history);
    const courtPairs = pairTeamsIntoCourtsByHistory(teams, history);
    return { courts: toCourts(courtPairs), sittingOut: sittingOut.map((p) => p.id) };
  }

  const groups = groupIntoFoursomes(active, history);
  const courtPairs = groups.map((g) => {
    const split = bestTeamSplit(g, history);
    return [split.teamA, split.teamB];
  });
  return { courts: toCourts(courtPairs), sittingOut: sittingOut.map((p) => p.id) };
}

function generateMexicanoRound(players, numCourts, priorRounds, mixedMode, pairingRule) {
  const history = buildHistory(players, priorRounds);
  const isFirstRound = priorRounds.length === 0;
  const { active, sittingOut } = selectActiveForRound(players, numCourts, history, mixedMode);

  if (mixedMode) {
    const { men, women } = splitByGender(active);
    let teams;
    let courtPairs;
    if (isFirstRound) {
      teams = formMixedTeamsRandom(men, women, history);
      courtPairs = pairTeamsIntoCourtsByHistory(teams, history);
    } else {
      const standings = computeStandings(players, priorRounds);
      const rankIndex = {};
      standings.forEach((s, i) => (rankIndex[s.id] = i));
      teams = formMixedTeamsByRank(men, women, rankIndex);
      courtPairs = pairTeamsIntoCourtsByStrength(teams, standings);
    }
    return { courts: toCourts(courtPairs), sittingOut: sittingOut.map((p) => p.id) };
  }

  let ranked;
  if (isFirstRound) {
    ranked = shuffle(active);
  } else {
    const standings = computeStandings(players, priorRounds);
    const rankIndex = {};
    standings.forEach((s, i) => (rankIndex[s.id] = i));
    ranked = [...active].sort((a, b) => rankIndex[a.id] - rankIndex[b.id]);
  }

  const groups = [];
  for (let i = 0; i < ranked.length; i += 4) {
    groups.push(ranked.slice(i, i + 4));
  }

  const courtPairs = groups.map((g) => {
    const [r1, r2, r3, r4] = g;
    if (pairingRule === "top-heavy") return [[r1, r2], [r3, r4]];
    return [[r1, r4], [r2, r3]];
  });

  return { courts: toCourts(courtPairs), sittingOut: sittingOut.map((p) => p.id) };
}

function scheduleQualityScore(players, rounds) {
  const history = buildHistory(players, rounds);
  let score = 0;
  Object.values(history.partnerCount).forEach((c) => {
    if (c > 1) score += (c - 1) * (c - 1) * 10;
  });
  Object.values(history.opponentCount).forEach((c) => {
    if (c > 1) score += (c - 1) * (c - 1);
  });
  const sitOuts = Object.values(history.sitOutCount);
  if (sitOuts.length) {
    score += (Math.max(...sitOuts) - Math.min(...sitOuts)) * 5;
  }
  return score;
}

function generateFullAmericanoSchedule(players, numCourts, numRounds, mixedMode, scheduleAttempts = 12) {
  let best = null;
  let bestScore = Infinity;
  for (let attempt = 0; attempt < scheduleAttempts; attempt++) {
    const rounds = [];
    for (let r = 0; r < numRounds; r++) {
      rounds.push(generateAmericanoRound(players, numCourts, rounds, mixedMode));
    }
    const score = scheduleQualityScore(players, rounds);
    if (score < bestScore) {
      bestScore = score;
      best = rounds;
    }
    if (bestScore === 0) break;
  }
  return best;
}

function computeStandings(players, rounds) {
  const points = {};
  const against = {};
  const played = {};
  const wins = {};
  players.forEach((p) => {
    points[p.id] = 0;
    against[p.id] = 0;
    played[p.id] = 0;
    wins[p.id] = 0;
  });

  rounds.forEach((round) => {
    round.courts.forEach((court) => {
      if (court.scoreA == null || court.scoreB == null) return;
      const aWon = court.scoreA > court.scoreB;
      const bWon = court.scoreB > court.scoreA;
      court.teamA.forEach((id) => {
        points[id] += court.scoreA;
        against[id] += court.scoreB;
        played[id] += 1;
        if (aWon) wins[id] += 1;
      });
      court.teamB.forEach((id) => {
        points[id] += court.scoreB;
        against[id] += court.scoreA;
        played[id] += 1;
        if (bWon) wins[id] += 1;
      });
    });
  });

  return players
    .map((p) => ({
      id: p.id,
      name: p.name,
      gender: p.gender,
      points: points[p.id],
      against: against[p.id],
      diff: points[p.id] - against[p.id],
      played: played[p.id],
      wins: wins[p.id],
    }))
    .sort((a, b) => b.points - a.points || b.diff - a.diff || b.wins - a.wins);
}

/* ============================================================
   UTILITIES
   ============================================================ */

function genId(prefix) {
  if (typeof crypto !== "undefined" && crypto.randomUUID) return prefix + "_" + crypto.randomUUID();
  return prefix + "_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
}

function suggestedRounds(numPlayers) {
  if (numPlayers <= 8) return Math.max(4, numPlayers - 1);
  if (numPlayers <= 16) return 8;
  return 7;
}

function playerName(players, id) {
  const idx = players.findIndex((pl) => pl.id === id);
  if (idx === -1) return "—";
  const p = players[idx];
  return p.name && p.name.trim() ? p.name.trim() : `Player ${idx + 1}`;
}

function playerById(players, id) {
  return players.find((pl) => pl.id === id) || null;
}

function clampInt(value, min, max) {
  const n = Math.round(Number(value));
  if (Number.isNaN(n)) return min;
  return Math.min(max, Math.max(min, n));
}

function roundIsComplete(round) {
  return round.courts.every((c) => c.scoreA != null && c.scoreB != null);
}

/* ============================================================
   PERSISTENCE — live sync across devices via Firestore, gated on
   being signed in to Court Pop (see the LIVE SYNC block near the
   top of this script for the actual auth/Firestore setup).
   ============================================================ */

// Everything about tournament state EXCEPT score values - used to decide
// when the whole-state sync needs to run. Scores are deliberately excluded
// (they sync via their own granular path above), so two phones entering
// different courts' scores at the same moment never fight over this.
function structuralFingerprintOf(s) {
  if (!s || typeof s !== "object") return "";
  const rounds = Array.isArray(s.rounds) ? s.rounds : [];
  return JSON.stringify({
    stage: s.stage,
    format: s.format,
    numCourts: s.numCourts,
    numRounds: s.numRounds,
    roundsTouched: s.roundsTouched,
    pointsTarget: s.pointsTarget,
    mixedMode: s.mixedMode,
    pairingRule: s.pairingRule,
    players: s.players,
    rounds: rounds.map((r) => ({
      sittingOut: r && r.sittingOut,
      courts: Array.isArray(r && r.courts) ? r.courts.map((c) => ({ court: c.court, teamA: c.teamA, teamB: c.teamB })) : [],
    })),
  });
}

/* ============================================================
   STATE
   ============================================================ */

const initialState = {
  stage: "setup", // 'setup' | 'tournament'
  format: "americano", // 'americano' | 'mexicano'
  numCourts: 2,
  numRounds: 7,
  roundsTouched: false, // has the user manually overridden the suggested round count?
  pointsTarget: 24,
  mixedMode: false,
  pairingRule: "balanced", // 'balanced' | 'top-heavy' (mexicano only)
  players: [],
  rounds: [],
  updatedAt: null,
};

function reducer(state, action) {
  switch (action.type) {
    case "HYDRATE":
      return { ...state, ...action.payload };
    case "SET_FORMAT":
      return { ...state, format: action.value };
    case "SET_COURTS":
      return { ...state, numCourts: action.value };
    case "SET_ROUNDS":
      return { ...state, numRounds: action.value, roundsTouched: true };
    case "SET_POINTS_TARGET":
      return { ...state, pointsTarget: action.value };
    case "SET_MIXED":
      return { ...state, mixedMode: action.value };
    case "SET_PAIRING_RULE":
      return { ...state, pairingRule: action.value };
    case "ADD_PLAYERS": {
      const players = [...state.players, ...action.players];
      const nextRounds = state.roundsTouched ? state.numRounds : suggestedRounds(players.length);
      return { ...state, players, numRounds: nextRounds };
    }
    case "UPDATE_PLAYER":
      return {
        ...state,
        players: state.players.map((p) => (p.id === action.id ? { ...p, ...action.patch } : p)),
      };
    case "REMOVE_PLAYER": {
      const players = state.players.filter((p) => p.id !== action.id);
      const nextRounds = state.roundsTouched ? state.numRounds : suggestedRounds(Math.max(players.length, 1));
      return { ...state, players, numRounds: nextRounds };
    }
    case "GENERATE_DRAW":
      return { ...state, stage: "tournament", rounds: action.rounds };
    case "REGENERATE_DRAW":
      return { ...state, rounds: action.rounds };
    case "UPDATE_SCORE": {
      const rounds = state.rounds.map((r, ri) => {
        if (ri !== action.roundIdx) return r;
        return {
          ...r,
          courts: r.courts.map((c) => (c.court !== action.court ? c : { ...c, [action.field]: action.value })),
        };
      });
      return { ...state, rounds };
    }
    case "ADD_ROUND":
      return { ...state, rounds: [...state.rounds, action.round] };
    case "RESET":
      return { ...initialState, updatedAt: Date.now() };
    default:
      return state;
  }
}

        style={{ color: "var(--court-blue-ink)", opacity: 0.75 }}
      >

      <div className="flex items-center justify-between gap-3">
        <TeamLabel players={players} ids={court.teamA} winning={aWins} />
        <input
          inputMode="numeric"
          pattern="[0-9]*"
          className="rally-score-input rally-tabular"
          value={court.scoreA == null ? "" : String(court.scoreA)}
          onChange={handleChange("scoreA")}
          placeholder="0"
          aria-label="Team A score"
        />

      <div className="rally-net-line my-3" />

    <div className={"min-w-0 flex-1" + (align === "right" ? " text-right" : "")}>

function SitOutChips({ ids, players }) {

    <div className="flex items-start gap-1.5 text-xs mt-3" style={{ color: "var(--slate)" }}>

function PlayScreen({ state, dispatch, tournamentId }) {
  const totalRounds = state.format === "americano" ? state.rounds.length : state.numRounds;
  const currentIndex = useMemo(() => {
    const firstIncomplete = state.rounds.findIndex((r) => !roundIsComplete(r));
    return firstIncomplete === -1 ? Math.max(state.rounds.length - 1, 0) : firstIncomplete;
  }, [state.rounds]);

  const [expandedIdx, setExpandedIdx] = useState(currentIndex);
  useEffect(() => {
    setExpandedIdx(currentIndex);
  }, [state.rounds.length]);

  const noScoresYet = state.rounds.every((r) => r.courts.every((c) => c.scoreA == null && c.scoreB == null));
  const lastRound = state.rounds[state.rounds.length - 1];
  const canGenerateNext =
    state.format === "mexicano" &&
    lastRound &&
    roundIsComplete(lastRound) &&
    state.rounds.length < state.numRounds;

  const handleRegenerate = () => {
    const rounds = generateFullAmericanoSchedule(state.players, state.numCourts, state.numRounds, state.mixedMode);
    dispatch({ type: "REGENERATE_DRAW", rounds });
  };

  const handleGenerateNext = () => {
    const round = generateMexicanoRound(state.players, state.numCourts, state.rounds, state.mixedMode, state.pairingRule);
    dispatch({ type: "ADD_ROUND", round });
  };

  return (
    <div className="max-w-xl mx-auto px-4 pb-28 pt-4">
      {state.format === "americano" && noScoresYet && state.rounds.length > 0 ? (
        <button
          type="button"
          onClick={handleRegenerate}
          className="rally-chip w-full mb-4 py-2 text-xs font-semibold flex items-center justify-center gap-1.5"
          style={{ color: "var(--ink)" }}
        >
          <Shuffle size={13} /> Shuffle a different draw
        </button>
      ) : null}

      {state.rounds.map((round, idx) => (
        <RoundBlock
          key={idx}
          round={round}
          roundIndex={idx}
          totalRounds={totalRounds}
          players={state.players}
          dispatch={dispatch}
          expanded={expandedIdx === idx}
          onToggle={() => setExpandedIdx(expandedIdx === idx ? -1 : idx)}
          pointsTarget={state.pointsTarget}
          tournamentId={tournamentId}
        />
      ))}

      {canGenerateNext ? (
        <button
          type="button"
          onClick={handleGenerateNext}
          className="rally-btn-primary w-full py-3.5 flex items-center justify-center gap-2 text-sm mt-2"
        >
          Complete round &amp; generate round {state.rounds.length + 1} <ArrowRight size={16} />
        </button>
      ) : null}

      {state.format === "mexicano" && lastRound && !roundIsComplete(lastRound) ? (
        <InlineNote icon={<Info size={13} />} tone="muted">
          Enter every score in round {state.rounds.length} to generate the next round.
        </InlineNote>
      ) : null}

      {state.format === "mexicano" && state.rounds.length >= state.numRounds && lastRound && roundIsComplete(lastRound) ? (
        <div className="text-center py-4">
          <Trophy size={22} className="mx-auto mb-1.5" style={{ color: "var(--ball-dark)" }} />
          <p className="text-sm font-semibold" style={{ color: "var(--ink)" }}>
            All {state.numRounds} rounds complete — check Standings for the winner.
          </p>
        </div>
      ) : null}
    </div>
  );
}

function RallyApp() {
  const [authChecked, setAuthChecked] = useState(false);
  const [uid, setUid] = useState(null);
  const [profile, setProfile] = useState(null);
  const [menuOpen, setMenuOpen] = useState(false);
  const [menuName, setMenuName] = useState('');
  const [menuError, setMenuError] = useState('');
  const [savingName, setSavingName] = useState(false);
  const [theme, setThemeState] = useState(() => (
    document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark'
  ));
  const [tournamentId, setTournamentId] = useState(null);
  const [state, dispatch] = useReducer(reducer, initialState);
  const [loaded, setLoaded] = useState(false);
  const [activeTab, setActiveTab] = useState("play");
  const [confirmReset, setConfirmReset] = useState(false);
  const [syncStatus, setSyncStatus] = useState("connecting");
  // Tracks the last structural fingerprint we know Firestore already has -
  // either because we just received it, or because we just wrote it
  // ourselves. The save-effect only writes when the CURRENT fingerprint
  // differs from this, which (unlike a one-shot "skip the next save" flag)
  // stays correct no matter how local edits and incoming updates interleave.
  const lastSyncedFingerprint = useRef(null);

  const structuralFingerprint = useMemo(() => structuralFingerprintOf(state), [
    state.stage,
    state.format,
    state.numCourts,
    state.numRounds,
    state.roundsTouched,
    state.pointsTarget,
    state.mixedMode,
    state.pairingRule,
    state.players,
    state.rounds,
  ]);

  // Step 1: must be signed in via Court Pop's own sign-in flow before
  // anything here loads. There's no separate sign-in UI on this page on
  // purpose - not signed in just means back to the main page to sign in
  // there, same account either way.
  useEffect(() => {
    const unsubscribe = onAuthStateChanged(auth, (user) => {
      if (!user) {
        location.replace("index.html?nav=1");
        return;
      }
      setUid(user.uid);
      setAuthChecked(true);
    });
    return () => unsubscribe();
  }, []);

  // Fetches the same account profile Your Games' own menu reads and
  // writes — same users/{uid} doc, same rules, so a name change here
  // shows up there too and vice versa.
  useEffect(() => {
    if (!uid) return;
    let cancelled = false;
    getMyProfile(uid).then((p) => {
      if (cancelled || !p) return;
      setProfile(p);
      setMenuName(p.name || '');
    }).catch(() => {});
    return () => { cancelled = true; };
  }, [uid]);

  function applyTheme(next) {
    const normalized = next === 'light' ? 'light' : 'dark';
    if (normalized === 'light') {
      document.documentElement.setAttribute('data-theme', 'light');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    try { localStorage.setItem('nextset-theme', normalized); } catch (e) {}
    setThemeState(normalized);
  }

  async function handleSaveName() {
    const name = menuName.trim();
    if (!name) {
      setMenuError('Enter a name.');
      return;
    }
    setSavingName(true);
    setMenuError('');
    try {
      await updateMyProfileName(uid, name);
      setProfile((p) => ({ ...(p || {}), name }));
    } catch (e) {
      setMenuError('Could not save — try again.');
    } finally {
      setSavingName(false);
    }
  }

  async function handleSignOut() {
    await signOutUser();
    location.replace('index.html?nav=1');
  }

  // Step 2: once signed in, resolve which tournament this tab is looking
  // at (from ?t= in the URL, or a freshly created one if this is a brand
  // new tournament), then subscribe to it live.
  useEffect(() => {
    if (!authChecked || !uid) return;
    let cancelled = false;
    let unsubscribeSnapshot = null;

    (async () => {
      let id;
      try {
        id = await ensureTournamentId(uid);
      } catch (e) {
        if (!cancelled) {
          setSyncStatus("error");
          setLoaded(true);
        }
        return;
      }
      if (cancelled) return;
      setTournamentId(id);

      unsubscribeSnapshot = onSnapshot(
        doc(db, "tournaments", id),
        (snap) => {
          if (cancelled) return;
          if (snap.exists()) {
            const val = snap.data();
            lastSyncedFingerprint.current = structuralFingerprintOf(val);
            dispatch({ type: "HYDRATE", payload: val });
          }
          setSyncStatus("live");
          setLoaded(true);
        },
        () => {
          if (cancelled) return;
          setSyncStatus("error");
          setLoaded(true);
        },
      );
    })();

    return () => {
      cancelled = true;
      if (unsubscribeSnapshot) unsubscribeSnapshot();
    };
  }, [authChecked, uid]);

  // Step 3: whole-tournament save whenever something structural changes.
  // Scores are deliberately excluded here - they sync through
  // syncScoreFieldToFirestore instead, via its own transaction, so two
  // courts entering scores at the same moment never race this save.
  useEffect(() => {
    if (!loaded || !tournamentId) return;
    if (structuralFingerprint === lastSyncedFingerprint.current) return; // already matches Firestore
    const t = setTimeout(() => {
      lastSyncedFingerprint.current = structuralFingerprint;
      setDoc(doc(db, "tournaments", tournamentId), { ...state, updatedAt: serverTimestamp() })
        .catch(() => setSyncStatus("error"));
    }, 300);
    return () => clearTimeout(t);
  }, [structuralFingerprint, loaded, tournamentId]);

  const handleGenerate = () => {
    let rounds;
    if (state.format === "americano") {
      rounds = generateFullAmericanoSchedule(state.players, state.numCourts, state.numRounds, state.mixedMode);
    } else {
      const firstRound = generateMexicanoRound(state.players, state.numCourts, [], state.mixedMode, state.pairingRule);
      rounds = [firstRound];
    }
    dispatch({ type: "GENERATE_DRAW", rounds: rounds || [] });
    setActiveTab("play");
  };

  const handleConfirmReset = () => {
    dispatch({ type: "RESET" });
    setConfirmReset(false);
    setActiveTab("play");
  };

  if (!authChecked || !loaded) {
    return (
      <div className="rally-root flex items-center justify-center" style={{ minHeight: "60vh" }}>
        <style>{GLOBAL_STYLES}</style>
        <Loader2 size={22} className="rally-spin" style={{ color: "var(--court-blue)" }} />
      </div>
    );
  }

  return (
    <div className="rally-root">
      <style>{GLOBAL_STYLES}</style>

      <div className="max-w-xl mx-auto w-full" style={{ padding: "20px 22px", borderBottom: "1px solid var(--line)", boxSizing: "border-box" }}>
        <div className="flex items-center justify-between w-full">
          <div className="flex items-center gap-1.5">
            <span
              className="font-bold uppercase"
              style={{ color: "var(--slate)", letterSpacing: "0.03em", fontSize: "0.92rem" }}
            >
              Court <span className="app-brand-pop">Pop</span>
            </span>
            <span className="text-sm font-bold" style={{ color: "var(--slate)" }}>
              -
            </span>
            <span style={{ color: "var(--ink)", fontFamily: "'Fraunces', Georgia, serif", fontWeight: 500, fontStyle: "italic", fontSize: "1.5rem", letterSpacing: "-0.01em" }}>
              Formats
            </span>
          </div>
          <button
            type="button"
            onClick={() => setMenuOpen(true)}
            style={{
              background: "var(--card)",
              border: "1px solid var(--line)",
              borderRadius: 8,
              padding: 8,
              color: "var(--slate)",
              display: "inline-flex",
              alignItems: "center",
              justifyContent: "center",
              flexShrink: 0,
            }}
            aria-label="Settings"
          >
            <svg viewBox="0 0 20 20" width="19" height="19" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
              <circle cx="10" cy="10" r="5" />
              <circle cx="10" cy="10" r="1.8" />
              <line x1="15" y1="10" x2="17.3" y2="10" />
              <line x1="13.54" y1="13.54" x2="15.16" y2="15.16" />
              <line x1="10" y1="15" x2="10" y2="17.3" />
              <line x1="6.46" y1="13.54" x2="4.84" y2="15.16" />
              <line x1="5" y1="10" x2="2.7" y2="10" />
              <line x1="6.46" y1="6.46" x2="4.84" y2="4.84" />
              <line x1="10" y1="5" x2="10" y2="2.7" />
              <line x1="13.54" y1="6.46" x2="15.16" y2="4.84" />
            </svg>
          </button>
        </div>
      </div>

      {state.stage === "tournament" ? (
        <TopBar state={state} activeTab={activeTab} setActiveTab={setActiveTab} onResetClick={() => setConfirmReset(true)} syncStatus={syncStatus} />
      ) : null}

      {state.stage === "setup" ? (
        <SetupScreen state={state} dispatch={dispatch} onGenerate={handleGenerate} syncStatus={syncStatus} />
      ) : activeTab === "play" ? (
        <PlayScreen state={state} dispatch={dispatch} tournamentId={tournamentId} />
      ) : (
        <StandingsScreen state={state} />
      )}

      {confirmReset ? (
        <ConfirmModal
          title="Start a new tournament?"
          body="This clears the current players, draw and scores for everyone viewing this tournament."
          onCancel={() => setConfirmReset(false)}
          onConfirm={handleConfirmReset}
        />
      ) : null}

      {menuOpen ? (
        <MenuModal
          profile={profile}
          nameValue={menuName}
          onNameChange={setMenuName}
          onSaveName={handleSaveName}
          savingName={savingName}
          error={menuError}
          theme={theme}
          onThemeChange={applyTheme}
          onSignOut={handleSignOut}
          onClose={() => { setMenuOpen(false); setMenuError(''); }}
        />
      ) : null}
    </div>
  );
}


const rallyRootEl = document.getElementById("root");
ReactDOM.createRoot(rallyRootEl).render(<RallyApp />);
if (typeof window !== "undefined") window.__rallyMounted = true;
</script>
</body>
</html>
